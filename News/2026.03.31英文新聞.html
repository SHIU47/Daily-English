            'taiwan-combined': {
                title: '台灣本地焦點',
                english: `[1] Economic Ministry Relaxes Local Content Rules for Phase 3.3 Offshore Wind Tenders\nThe Ministry of Economic Affairs (MOEA) announced a landmark policy pivot, significantly lowering "local content" requirements for the Phase 3.3 offshore wind auction. This shift is a direct response to global supply chain bottlenecks. Macroscopically, this signifies a transition from "Industrial Protectionism" to "Energy Pragmatism," ensuring that the "Silicon Shield" remains powered by a resilient green energy grid.\n\n[2] Central Bank Warns of Credit Overextension Risks Linked to "New Youth" Mortgage Program\nIn its latest report, the Central Bank signaled concern over the rapid increase in household debt associated with subsidized mortgages. Macroscopically, this highlights the "Intergenerational Wealth Gap" challenge. The central bank is preparing potential "Macro-prudential Measures" to prevent a localized housing bubble from destabilizing the financial system.\n\n[3] Taiwan’s First "Climate Litigation" Reaches Court; NGOs Challenge State Carbon Targets\nA coalition of NGOs and youth activists faced off against the Ministry of Environment, arguing that current national carbon reduction targets are unconstitutionally weak. Macroscopically, this represents the "Judicialization of Climate Policy," where courts become the primary arbiter of environmental justice.`,
                chinese: `【1】經濟部放寬離岸風電 3.3 期國產化門檻以應對能源缺口\n經濟部（MOEA）昨日宣布了一項具里程碑意義的政策轉向，顯著降低了即將舉行的離岸風電 3.3 期競標的「國產化（local content）」要求。這一制度性轉變是對全球供應鏈瓶頸的直接回應，以及快速建立再生能源基載的迫切需求。從宏觀角度看，這標誌著從「產業保護主義」向「能源現實主義（Energy Pragmatism）」的轉型。透過允許開發商更自由地向國際夥伴採購組件，台灣旨在降低 2030 淨零時程的風險，確保「矽盾」由具韌性且來源多元的綠電網驅動。\n\n【2】央行示警「新青安」貸款衍生之信用擴張風險\n在最新的季度報告中，中央銀行對與政府補貼房貸計畫相關的家庭債務迅速增長表示憂慮。從宏觀角度看，這凸顯了「跨世代財富鴻溝」的挑戰。隨著年輕專業人士在高利率環境下利用補貼債務進行槓桿操作，央行正為今年稍晚可能採取的「總體審慎措施（Macro-prudential Measures）」做準備，以防止局部房地產泡沫在台灣應對全球經濟不確定性時損害整體金融體系的穩定。\n\n【3】台灣首宗「氣候訴訟」開庭，挑戰政府減碳目標不足\n由環境 NGO 與青年活動家組成的聯盟昨日在法庭上與環境部對壘，主張目前的國家減碳目標因過於薄弱而有違憲之虞。從宏觀角度看，這代表了「氣候政策的司法化（Judicialization）」。此案映照了全球趨勢，即法院正成為環境正義的首要仲裁者。對於專業人士而言，結果可能會引發企業 ESG 合規要求的激進變革，迫使產業採取比目前立法更為強硬的脫碳進度。`,

            'iran-ultimatum': {
                title: '中東最後通牒',
                english: `Trump Issues "Tehran Energy Warning" as 5-Day Truce Enters Final 24-Hour Countdown\nPresident Trump posted a final ultimatum on Truth Social, stating that the U.S. will target Iranian "energy distribution nodes" if a permanent maritime agreement for the Strait of Hormuz is not signed by tonight. Macroscopically, this represents a "Binary Geopolitical Risk" at its peak. This signifies the move toward "Resource Erasure" as a tool of warfare. Global markets are currently pricing in a $150/barrel scenario, reflecting a total breakdown in diplomatic trust and the institutionalization of the "War Premium" in global energy logistics. Carriers are already rerouting around the Cape of Good Hope.`,
                chinese: `特朗普發布「德黑蘭能源警告」，五日停火進入最後 24 小時\n川普總統昨日在 Truth Social 上發布了最後通牒，聲明若今晚之前未能簽署關於荷姆茲海峽（Strait of Hormuz）的永久海事協議，美國將瞄準伊朗的「能源分銷節點」。從宏觀角度看，這代表了處於巔峰的「二元地緣政治風險」。這標誌著將「資源抹除（Resource Erasure）」作為戰爭工具的轉向。全球市場目前正針對每桶 150 美元的極端情境進行定價，反映出外交信任的徹底破裂，以及全球能源物流中「戰爭溢價」的制度化。多數承運商已開始繞道好望角。`,

                    'Maritime agreement (n.phr.): 海事協議', 'Binary Risk (n.phr.): 二元風險 (非黑即白)', 'Resource Erasure (n.phr.): 資源抹除', 'Pricing in (phr.v.): 計入價格/預期',

                title: '日本財政預算與利率',
                english: `Japan’s Cabinet Approves Temporary Budget to Mitigate Interest Rate Volatility\nThe Japanese government finalized a bridge budget yesterday to manage essential services as the Bank of Japan (BoJ) continues its historic tightening cycle. Macroscopically, this is a "Fiscal Buffer" measure. In an era where "Zero-Interest Policy" is dead, Japan is signaling to global markets that it will utilize administrative budgets to prevent a "Debt Spiral," effectively shielding its massive social security obligations from the rising costs of capital. Analysts suggest this is a critical test for "Takaichinomics" in a high-rate environment.`,
                chinese: `日本內閣批准臨時預算以因應利率波動\n日本政府昨日敲定了一項「過度性預算（bridge budget）」，以便在日銀（BoJ）持續進行歷史性緊縮週期之際，維持基本公共服務。從宏觀角度看，這是一項「財政緩衝」措施。在「零利率政策」宣告終結的時代，日本正向全球市場發出訊號：它將利用行政預算來防止「債務螺旋（Debt Spiral）」，有效地保護其龐大的社會保障義務免受資金成本上升的衝擊。分析師建議，這是在高利率環境下對「高市經濟學」的一場關鍵考驗。`,
                vocabulary: [
                    'Bridge budget (n.phr.): 過渡性預算', 'Mitigate (v.): 緩解/減輕', 'Interest rate volatility (n.phr.): 利率波動', 'Bank of Japan (BoJ) (n. proper): 日本銀行 (央行)',

                title: '中資企業赴墨避稅',
                english: `Chinese Firms Accelerate Outbound Investment to Mexico to Bypass New U.S. Tariffs\nNew trade data from Mexico highlights a 40% surge in factory permits for Chinese electronics firms in the last 24 hours. This represents a "Supply Chain Camouflage" strategy. Macroscopically, the Trump administration's 15% global tariff is creating a "Transshipment Economy," where the global trade map is dictated by legal "Origin Verification" battles rather than pure market efficiency. The U.S. Trade Representative has already warned that "assembled in Mexico" will face strict scrutiny.`,
                chinese: `中資企業加速赴墨西哥投資以規避美國新關稅\n來自墨西哥的最新貿易數據顯示，在過去 24 小時內，中資電子企業獲得的工廠許可證激增了 40%。這代表了一種「供應鏈偽裝（Supply Chain Camouflage）」策略。從宏觀角度看，川普政府 15% 的全球關稅並未將製造業帶回美國，反而創造了一種「轉運經濟（Transshipment Economy）」，2026 年的全球貿易版圖正由法律上的「原產地驗證（Origin Verification）」之爭所主導，而非純粹的市場效率。美國貿易代表已警告，「墨西哥組裝」將面臨嚴格審查。`,

                    'Factory permits (n.phr.): 工廠許可證', 'Supply Chain Camouflage (n.phr.): 供應鏈偽裝', 'Transshipment Economy (n.phr.): 轉運經濟', 'Dictated by (phr.): 由...決定/主宰',
                    'Origin Verification (n.phr.): 原產地驗證', 'Market efficiency (n.phr.): 市場效率', 'Strict scrutiny (n.phr.): 嚴格審查', 'Assembled (v.pp.): 組裝的',
                    'Acceleration (n.): 加速', 'Electronics (n.): 電子產品', 'Representative (n.): 代表', 'Framework (n.): 框架/準則',
                    'Camouflage (n.): 偽裝', 'Transshipment (n.): 轉運', 'Verification (n.): 驗證/核實', 'Incursion (n.): 入侵',

                    { q: 'What does "bypass" mean in the headline?', options: ['To follow', 'To go around or avoid', 'To repair', 'To build a road'], answer: 'To go around or avoid' },
                    { q: 'The word "accelerate" is a synonym for ______.', options: ['Slow down', 'Speed up', 'Stay still', 'End'], answer: 'Speed up' },

                    { q: 'A "permit" is an ______.', options: ['Official document giving permission', 'A secret deal', 'A type of car', 'A financial loss'], answer: 'Official document giving permission' },
                    { q: 'The strategy aims to avoid "pure market ______."', options: ['Failure', 'Efficiency', 'Closure', 'Expansion'], answer: 'Efficiency' },
                    { q: 'Mexico is a neighbor of which country mentioned as a target?', options: ['China', 'USA', 'Russia', 'Japan'], answer: 'USA' }
                ]
            },
            'aso-gold': {
                title: '算力證券化與黃金',
                english: `Gold Stabilizes Near $4,200 as Investors Pivot to Compute-Backed Securities (ASO)\nSpot gold saw its lowest volatility in a week yesterday as capital continues to rotate into high-yield Treasuries and AI infrastructure bonds. Macroscopically, this marks the "Financialization of the Post-Resource World." In 2026, institutional investors are increasingly viewing "Compute Capacity" — rather than "Gold" — as the ultimate store of value. This signifies a fundamental shift where the ability to process data is considered more liquid and valuable than physical mineral reserves.`,
                chinese: `黃金在 4,200 美元附近築底，資金轉向算力證券（ASO）\n現貨金價昨日呈現一週來最低的波動率，因為資本正持續轉向高收益美債與 AI 基礎設施債券。從宏觀角度看，這標誌著「後資源世界的金融化（Financialization of the Post-Resource World）」。在 2026 年，機構投資者日益將「運算能力（Compute Capacity）」——而非「黃金」——視為終極的價值儲存手段。這標誌著一項根本性的轉變：處理數據的能力現在被認為比實體礦產儲備更具流動性與價值。`,
                vocabulary: [
                    'Stabilizes (v.): 穩定/築底', 'Pivot (n./v.): 轉向/樞紐', 'Compute-Backed Securities (ASO) (n.phr.): 算力抵押證券', 'Spot gold (n.phr.): 現貨黃金',
                    'Volatility (n.): 波動性', 'Rotate (v.): 輪動/旋轉', 'High-yield Treasuries (n.phr.): 高收益美債', 'AI infrastructure bonds (n.phr.): AI 基礎設施債券',
                    'Financialization (n.): 金融化', 'Post-Resource World (n.phr.): 後資源世界', 'Institutional investors (n.phr.): 機構投資者', 'Compute Capacity (n.phr.): 運算能力',
                    'Store of value (n.phr.): 價值儲存', 'Liquid (adj.): 具流動性的', 'Mineral reserves (n.phr.): 礦產儲備', 'Fundamental shift (n.phr.): 根本轉變',
                    'ASO (Asset-Backed Compute) (n. proper): 算力資產化', 'Yield (n.): 收益', 'Liquidity (n.): 流動性', 'Reserves (n.): 儲備',
                    'Compute (n.): 運算/算力', 'Precious (adj.): 珍貴的', 'Metal (n.): 金屬', 'Asset (n.): 資產',
                    'Margin (n.): 利潤/邊際', 'Liquidity (n.): 流動性', 'Constraint (n.): 限制', 'Yield (n.): 殖利率',
                    'Optimization (n.): 優化', 'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的'
                ],
                quiz: [
                    { q: 'At what price level did gold stabilize near?', options: ['$3,000', '$4,200', '$5,000', '$1,230'], answer: '$4,200' },
                    { q: 'What new financial instrument is attracting capital away from gold?', options: ['Real estate bonds', 'Compute-Backed Securities (ASO)', 'Farming options', 'Oil futures only'], answer: 'Compute-Backed Securities (ASO)' },
                    { q: 'Capital is rotating into high-yield ______ and AI infrastructure bonds.', options: ['Treasuries', 'Clothing', 'Gold bars', 'Food'], answer: 'Treasuries' },
                    { q: 'The news marks the "______ of the Post-Resource World."', options: ['Exploration', 'Financialization', 'Destruction', 'Hiding'], answer: 'Financialization' },
                    { q: 'What is being viewed as the "ultimate store of value" in 2026?', options: ['Gold', 'Compute Capacity', 'Physical cash only', 'Land'], answer: 'Compute Capacity' },
                    { q: 'Data processing ability is now considered more ______ than mineral reserves.', options: ['Solid', 'Liquid', 'Heavy', 'Boring'], answer: 'Liquid' },
                    { q: 'What does "stabilizes" mean in a market context?', options: ['Crashing', 'Staying at a steady level after a fall', 'Rising extremely fast', 'Closing down'], answer: 'Staying at a steady level after a fall' },
                    { q: 'The word "pivot" in the text means ______.', options: ['To stay still', 'To turn or shift focus', 'To break', 'To ignore'], answer: 'To turn or shift focus' },
                    { q: 'What is a "security" in finance?', options: ['A bodyguard', 'A tradable financial asset', 'A door lock', 'A secret code'], answer: 'A tradable financial asset' },
                    { q: 'The term "liquid" describes an asset that can be ______.', options: ['Turned into water', 'Quickly converted to cash without loss', 'Frozen', 'Stolen easily'], answer: 'Quickly converted to cash without loss' },
                    { q: 'What are "mineral reserves"?', options: ['A type of bank account', 'The quantity of minerals that can be extracted for profit', 'A nature park', 'A computer server'], answer: 'The quantity of minerals that can be extracted for profit' },
                    { q: 'The term "ASO" is used for ______-Backed Securities.', options: ['Air', 'Compute', 'Oil', 'Automobile'], answer: 'Compute' },
                    { q: 'Spot gold volatility was the ______ in a week.', options: ['Highest', 'Lowest', 'Zero', 'Normal'], answer: 'Lowest' },
                    { q: 'Institutional ______ are moving their capital.', options: ['Investors', 'Teachers', 'Doctors', 'Students'], answer: 'Investors' },
                    { q: 'The shift is described as "fundamental," meaning it is ______.', options: ['Small', 'Basic and very important', 'Funny', 'Temporary'], answer: 'Basic and very important' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            const submitButton = result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${submitButton}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            if (result === undefined) {
                document.querySelectorAll('.quiz-option').forEach(el => {
                    const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                    const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                    const optValue = el.innerText.substring(3).replace('✓', '').trim();
                    el.classList.remove('selected');
                    if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
                });
            }
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
