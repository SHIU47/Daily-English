    <script>
        // --- DATA STRUCTURE ---
        const NEWS_DATA = {
            'taiwan-focus': {
                title: '台灣本地科技與外交',
                english: `[1] Lech Walesa in Taipei: Taiwan as a Visionary Leader for Peace in a Shifting World Order\nNobel Peace Prize laureate Lech Walesa delivered a keynote yesterday, asserting that Taiwan’s model of peaceful democratic transition serves as a blueprint for the Chinese-speaking world. Macroscopically, Walesa’s visit underscores Taiwan’s growing role as an ideological counter-anchor in the Indo-Pacific, leveraging "soft power" to solidify its legitimacy.\n\n[2] NDC Reports Sustained Growth Momentum: AI Server Exports Remain Primary Economic Engine\nThe National Development Council (NDC) highlighted that Taiwan’s leading indicators continue to climb, fueled by the persistent "AI Gold Rush." Export orders for AI servers are offsetting stagnation in traditional manufacturing. Macroscopically, this "one-pillar" growth necessitates further diversification into biotech to ensure resilience.\n\n[3] MOEA Expands Water Alert: Hsinchu Science Park Activates Preemptive Recycling Protocols\nAs spring rainfall remains below historical averages, the Water Resources Agency has expanded the "Green Light" alert to major industrial hubs. Macroscopically, the seasonal "Water-Compute" bottleneck remains the primary environmental constraint for Taiwan's fab expansion.`,
                chinese: `【1】諾貝爾和平獎得主華勒沙訪台：肯定台灣在改變中的世界秩序中具備領導力\n諾貝爾和平獎得主華勒沙（Lech Walesa）昨日於玉山論壇發表主題演講，主張台灣和平民主轉型的模式是華人世界的藍圖。他強調在目前地緣政治破碎的時代，「討論與和平手段」永遠比「武力與脅迫」更長久。從宏觀角度看，華勒沙的訪問凸顯了台灣在印太地區作為「意識形態反制錨點」日益增長的角色，利用「軟實力」在全球系統性轉型中鞏固其作為主權功能節點的合法性。\n\n【2】國發會：二月景氣燈號續強，AI 伺服器出口紅利仍為經濟成長主軸\n國家發展委員會（國發會）今日強調，受持續的「AI 淘金熱」推動，台灣的領先指標持續攀升。AI 伺服器與高效能運算零組件的出口訂單正抵銷傳統製造業的相對停滯。從宏觀角度看，雖然這種「單支柱」成長提供了短期財政實力，但也增加了台灣經濟對全球科技資本支出週期的敏感度，有必要進一步多元化發展高價值服務與生技產業，以確保長期的結構韌性。\n\n【3】經濟部：三月水情警戒擴大，竹科水資源調度進入「預防性循環」階段\n由於春季降雨量持續低於歷史平均水平，水利署已將「綠燈」水情警報擴大至主要工業樞紐。新竹的晶圓廠已轉向高強度水循環利用，以緩解供應壓力。從宏觀角度看，季節性的「水與運算（Water-Compute）」瓶頸仍是台灣晶圓廠擴建的主要環境限制。這種週期性的稀缺正推動產業轉向制度化的海水淡化計畫與再生水基礎設施，以使高科技生產力與氣候波動脫鉤。`,
                vocabulary: [
                    'Laureate (n.): 獲獎者', 'Keynote (n.): 主題演講', 'Blueprint (n.): 藍圖', 'Fragmentation (n.): 破碎/分裂',
                    'Coercion (n.): 脅迫', 'Counter-anchor (n.phr.): 反制錨點', 'Legitimacy (n.): 合法性', 'Functional node (n.phr.): 功能性節點',
                    'Leading indicators (n.phr.): 領先指標', 'Gold Rush (n.phr.): 淘金熱', 'Offsetting (v.ger.): 抵銷', 'Stagnation (n.): 停滯',
                    'One-pillar growth (n.phr.): 單支柱成長', 'Diversification (n.): 多元化', 'Structural resilience (n.phr.): 結構性韌性', 'Preemptive (adj.): 預防性的/先發制人的',
                    'Protocols (n.): 協議/程序', 'Constraint (n.): 限制/約束', 'Desalination (n.): 海水淡化', 'Decouple (v.): 脫鉤',
                    'Climatic volatility (n.phr.): 氣候波動', 'Averaging (v.ger.): 平均為', 'Incentivize (v.): 激勵', 'Stark (adj.): 鮮明的/嚴酷的',
                    'Bilateral (adj.): 雙邊的', 'Strategic (adj.): 戰略的', 'Infrastructure (n.): 基礎建設', 'Expansion (n.): 擴張',
                    'Resilience (n.): 韌性', 'Unprecedented (adj.): 史無前例的', 'Capacity (n.): 容量', 'Deployment (n.): 部署'
                ],
                quiz: [
                    { q: 'What does Lech Walesa describe as a "blueprint" for the Chinese-speaking world?', options: ['Taiwan’s semiconductor industry', 'Taiwan’s model of peaceful democratic transition', 'Taiwan’s export engine', 'Hsinchu Science Park'], answer: 'Taiwan’s model of peaceful democratic transition' },
                    { q: 'In which forum did Lech Walesa deliver his keynote speech?', options: ['GTC 2026', 'Yushan Forum', 'FOMC Meeting', 'UN Assembly'], answer: 'Yushan Forum' },
                    { q: 'According to the NDC, what is the "primary economic engine" for Taiwan currently?', options: ['Traditional textiles', 'AI server exports', 'Biotech services', 'Real estate'], answer: 'AI server exports' },
                    { q: 'The term "one-pillar growth" implies that Taiwan’s economy is ______.', options: ['Extremely balanced', 'Heavily dependent on a single sector', 'Collapsing', 'Diversified'], answer: 'Heavily dependent on a single sector' },
                    { q: 'What alert color was expanded to major industrial hubs due to water scarcity?', options: ['Red', 'Yellow', 'Green', 'Orange'], answer: 'Green' },
                    { q: 'Fabs in Hsinchu have activated "preemptive" protocols to handle ______.', options: ['Power outages', 'Water shortages', 'Labor strikes', 'Cyber attacks'], answer: 'Water shortages' },
                    { q: 'Lech Walesa is a laureate of which prize?', options: ['Nobel Physics Prize', 'Nobel Peace Prize', 'Turing Award', 'Pulitzer Prize'], answer: 'Nobel Peace Prize' },
                    { q: 'The term "soft power" refers to influence gained through ______.', options: ['Force and weapons', 'Cultural and moral attraction', 'High taxes', 'Strict laws'], answer: 'Cultural and moral attraction' },
                    { q: 'What is the "Water-Compute" bottleneck?', options: ['A problem with computer cooling only', 'Environmental constraint where chip production needs high water volume', 'Leaking pipes in Hsinchu', 'The cost of bottled water'], answer: 'Environmental constraint where chip production needs high water volume' },
                    { q: 'Taiwan is described as an "ideological counter-anchor" in which region?', options: ['Middle East', 'Indo-Pacific', 'North Atlantic', 'Eastern Europe'], answer: 'Indo-Pacific' },
                    { q: 'What does "stagnation" mean in an industrial context?', options: ['Rapid expansion', 'Lack of growth or activity', 'Sudden improvement', 'Global trade'], answer: 'Lack of growth or activity' },
                    { q: 'The government wants to "decouple" high-tech productivity from ______.', options: ['Electricity', 'Climatic volatility', 'US Dollar', 'The internet'], answer: 'Climatic volatility' },
                    { q: 'The NDC reports that "leading ______" continue to climb.', options: ['Prices', 'Indicators', 'Workers', 'Buildings'], answer: 'Indicators' },
                    { q: 'What technology is mentioned for future water supply independence?', options: ['Traditional dams', 'Desalination projects', 'Cloud seeding only', 'Importing water'], answer: 'Desalination projects' },
                    { q: 'Walesa said "discussion and peaceful means" will outlast "______ and ______."', options: ['Love and care', 'Force and coercion', 'Money and greed', 'Old and new'], answer: 'Force and coercion' }
                ]
            },
            'trump-diplomacy': {
                title: '川普外交施壓盟友',
                english: `Secretary of State Marco Rubio has issued a directive to U.S. diplomats worldwide, giving allies until March 20 to formally blacklist the Iranian Revolutionary Guard Corps (IRGC) and Hezbollah as terrorist organizations. This aggressive "Coalition Alignment" strategy aims to isolate Tehran financially ahead of further military action. Macroscopically, this signifies a move toward "Transactional Diplomacy," where U.S. security guarantees are becoming increasingly tied to explicit political alignment. This forces European and Asian allies into a difficult "neutrality vs. security" trilemma as they navigate the current Middle East rupture.`,
                chinese: `川普政府對盟友施壓：要求正式將伊朗革命衛隊與黎巴嫩真主黨列為恐怖組織\n國務卿馬可·魯比奧（Marco Rubio）已向全球美國外交官發布指示，要求盟國在 3 月 20 日之前正式將伊朗革命衛隊（IRGC）和黎巴嫩真主黨列為恐怖組織。這項激進的「聯盟對齊」策略旨在進一步採取軍事行動前，在金融上孤立德黑蘭。從宏觀角度看，這標誌著向「交易型外交（Transactional Diplomacy）」的轉型，美國的安全保障正日益與明確的政治結盟掛鉤。這迫使歐洲與亞洲盟友在應對目前的中東裂痕時，陷入「中立 vs. 安全」的困難三難困境。`,
                vocabulary: [
                    'Directive (n.): 指示/命令', 'Blacklist (v.): 列入黑名單', 'IRGC (Iranian Revolutionary Guard Corps) (n. proper): 伊朗革命衛隊', 'Hezbollah (n. proper): 黎巴嫩真主黨',
                    'Terrorist organizations (n.phr.): 恐怖組織', 'Aggressive (adj.): 激進的/強力的', 'Coalition Alignment (n.phr.): 聯盟對齊', 'Isolate (v.): 孤立',
                    'Transactional Diplomacy (n.phr.): 交易型外交', 'Security guarantees (n.phr.): 安全保障', 'Explicit (adj.): 明確的', 'Political alignment (n.phr.): 政治結盟',
                    'Neutrality (n.): 中立', 'Trilemma (n.): 三難困境', 'Rupture (n.): 裂痕/決裂', 'Navigate (v.): 應對/導航',
                    'Sanctions (n.): 制裁', 'Infrastructure (n.): 基礎建設', 'Strategic (adj.): 戰略的', 'Bilateral (adj.): 雙邊的',
                    'Implementation (n.): 執行', 'Verification (n.): 驗證', 'Mandate (n.): 授權', 'Escalation (n.): 升級',
                    'Constraint (n.): 限制', 'Sovereignty (n.): 主權', 'Integrity (n.): 完整性', 'Incursion (n.): 入侵',
                    'Premium (n.): 溢價', 'Disruption (n.): 中斷', 'Volatility (n.): 波動', 'Resilience (n.): 韌性'
                ],
                quiz: [
                    { q: 'Who is the U.S. Secretary of State mentioned in the text?', options: ['Donald Trump', 'Marco Rubio', 'Kevin Hassett', 'C. C. Wei'], answer: 'Marco Rubio' },
                    { q: 'What is the deadline given to allies to blacklist the groups?', options: ['March 12', 'March 17', 'March 20', 'September 1'], answer: 'March 20' },
                    { q: 'Which two organizations does the U.S. want allies to label as terrorists?', options: ['UN and WHO', 'IRGC and Hezbollah', 'NVIDIA and TSMC', 'OPEC and EU'], answer: 'IRGC and Hezbollah' },
                    { q: 'The term "Transactional Diplomacy" refers to security guarantees being tied to ______.', options: ['Money only', 'Explicit political alignment', 'The price of oil', 'Internet access'], answer: 'Explicit political alignment' },
                    { q: 'What is the goal of isolating Tehran financially?', options: ['To help them grow', 'To prevent further military action', 'To isolate them ahead of military action', 'To lower taxes'], answer: 'To isolate them ahead of military action' },
                    { q: 'Allies in which two regions are specifically mentioned as facing a "trilemma"?', options: ['South America and Africa', 'Europe and Asia', 'North America and Arctic', 'Oceania only'], answer: 'Europe and Asia' },
                    { q: 'A "trilemma" is a situation with how many difficult choices?', options: ['One', 'Two', 'Three', 'Ten'], answer: 'Three' },
                    { q: 'The word "directive" means which of the following?', options: ['A suggestion', 'An official instruction or order', 'A map', 'A secret plan'], answer: 'An official instruction or order' },
                    { q: 'What does "blacklist" mean?', options: ['To paint a room black', 'To list a group for exclusion or punishment', 'To give a gift', 'To hire new workers'], answer: 'To list a group for exclusion or punishment' },
                    { q: 'Tehran is the capital of which country?', options: ['Iraq', 'Iran', 'Lebanon', 'Israel'], answer: 'Iran' },
                    { q: 'The word "explicit" is a synonym for ______.', options: ['Vague', 'Clear and stated directly', 'Hidden', 'Boring'], answer: 'Clear and stated directly' },
                    { q: 'Rubio issued the directive to U.S. ______ worldwide.', options: ['Soldiers', 'Diplomats', 'Teachers', 'Doctors'], answer: 'Diplomats' },
                    { q: 'What is the "neutrality vs. security" trilemma?', options: ['Choosing between food and water', 'The difficulty of staying neutral while needing U.S. protection', 'The cost of insurance', 'The speed of cars'], answer: 'The difficulty of staying neutral while needing U.S. protection' },
                    { q: 'The Middle East situation is described as a "______," meaning a break in relations.', options: ['Bridge', 'Rupture', 'Meeting', 'Success'], answer: 'Rupture' },
                    { q: 'The strategy aims to ______ Tehran financially.', options: ['Support', 'Isolate', 'Expand', 'Ignore'], answer: 'Isolate' }
                ]
            },
            'tesla-terafab': {
                title: '特斯拉 Terafab 晶片計畫',
                english: `Elon Musk officially launched the "Terafab" project today, aimed at manufacturing Tesla’s proprietary "AI5" chips for Robotaxis and Optimus. This industrial shift moves Tesla toward "Hardware Autonomy," reducing its multibillion-dollar dependency on NVIDIA. Macroscopically, the Terafab represents a massive gamble on "Embodied AI." If successful, Tesla will not only be a vehicle manufacturer but also a primary producer of the "Neural Engines" required to automate physical labor across the global economy.`,
                chinese: `特斯拉「Terafab」計畫正式啟動：200 億美元垂直整合晶片廠力爭「AI5」主導權\n伊隆·馬斯克今日正式啟動了「Terafab」計畫，旨在為自駕計程車（Robotaxi）與人型機器人 Optimus 製造特斯拉專有的「AI5」晶片。這項產業轉移使特斯拉邁向「硬體自主（Hardware Autonomy）」，減少對 NVIDIA 高達數十億美元的依賴。從宏觀角度看，Terafab 代表了對「具身智能（Embodied AI）」的一場巨大賭注。如果成功，特斯拉將不僅僅是一家汽車製造商，更將成為全球經濟中自動化體力勞動所需的「神經引擎」的主要生產者。`,
                vocabulary: [
                    'Breaks Ground (phr.v.): 動工/破土', 'Proprietary (adj.): 專有的/專利的', 'AI5 chips (n. proper): 特斯拉新晶片代號', 'Robotaxis (n.): 自駕計程車',
                    'Optimus (n. proper): 特斯拉機器人名', 'Industrial shift (n.phr.): 產業轉型', 'Hardware Autonomy (n.phr.): 硬體自主', 'Dependency (n.): 依賴',
                    'Gamble (n./v.): 賭注/冒險', 'Embodied AI (n.phr.): 具身智能', 'Neural Engines (n.phr.): 神經引擎', 'Automate (v.): 自動化',
                    'Physical labor (n.phr.): 體力勞動', 'Fabrication (n.): 製造', 'Multibillion-dollar (adj.): 數十億美元的', 'Primary producer (n.phr.): 主要生產者',
                    'Infrastructure (n.): 基礎建設', 'Optimization (n.): 優化', 'Performance (n.): 性能', 'Capacity (n.): 產能',
                    'Integration (n.): 整合', 'Architecture (n.): 架構', 'Deployment (n.): 部署', 'Efficiency (n.): 效率',
                    'Sustained (adj.): 持續的', 'Unprecedented (adj.): 史無前例的', 'Strategic (adj.): 戰略的', 'Divergence (n.): 分歧',
                    'Backlog (n.): 積壓', 'Milestone (n.): 里程碑', 'Investment (n.): 投資', 'Consolidation (n.): 鞏固'
                ],
                quiz: [
                    { q: 'What is the name of Tesla’s new $20 billion chip plant project?', options: ['Gigafab', 'Terafab', 'Megafab', 'Tesla Silicon'], answer: 'Terafab' },
                    { q: 'What is the name of the new chip that will be produced at Terafab?', options: ['Blackwell', 'AI5', 'M4', 'Exynos'], answer: 'AI5' },
                    { q: 'The project aims to reduce Tesla’s dependency on which company?', options: ['Apple', 'Intel', 'NVIDIA', 'TSMC'], answer: 'NVIDIA' },
                    { q: 'What two products will be powered by the AI5 chip?', options: ['iPhone and iPad', 'Robotaxis and Optimus robots', 'Model S and Model 3 only', 'Solar panels'], answer: 'Robotaxis and Optimus robots' },
                    { q: 'Tesla is moving toward "______ Autonomy."', options: ['Software', 'Hardware', 'Human', 'Financial'], answer: 'Hardware' },
                    { q: 'The project is described as a gamble on which technology?', options: ['Cloud storage', 'Embodied AI', 'Social media', 'Virtual reality'], answer: 'Embodied AI' },
                    { q: 'If successful, Tesla will become a primary producer of what for the global economy?', options: ['Electric batteries only', 'Neural Engines to automate physical labor', 'Software code only', 'Office furniture'], answer: 'Neural Engines to automate physical labor' },
                    { q: 'What does "proprietary" mean?', options: ['Free for all', 'Owned exclusively by an individual or company', 'Publicly available', 'Broken'], answer: 'Owned exclusively by an individual or company' },

                    { q: 'Which leader officially launched the project today?', options: ['Jensen Huang', 'Elon Musk', 'Tim Cook', 'Mark Zuckerberg'], answer: 'Elon Musk' }
                ]

            'micron-hbm4': {
                title: '美光 HBM4 正式量產',
                english: `Micron announced at GTC 2026 that its 36GB HBM4 modules have entered mass production, offering 2.3× the bandwidth of HBM3E with 20% better power efficiency. This structural shift highlights that "Memory" is now the primary arbiter of AI scaling. Macroscopically, with its 2026 capacity already sold out under binding contracts, Micron is transitioning from a cyclical commodity provider to a "Strategic Utility." Its technological lead ensures that the "Memory Wall" will not block the immediate scaling of trillion-parameter models.`,
                chinese: `美光（Micron）HBM4 正式進入量產：36GB 12H 堆疊領先全球記憶體市場\n美光在 GTC 2026 大會上宣布，其 36GB HBM4 模組已進入量產，提供較 HBM3E 高出 2.3 倍的頻寬，且能源效率提升 20%。這一結構性轉變凸顯了「記憶體」現已成為 AI 擴張的主要決定因素。從宏觀角度看，隨著 2026 年產能已在約束性合約下售罄，美光正從週期性的「大宗商品供應商」轉型為「策略性公用事業」。其技術領先地位確保了「記憶體牆」不會阻礙兆級參數模型的即時擴張。`,
                vocabulary: [
                    'HBM4 (High Bandwidth Memory 4) (n. proper): 第四代高頻寬記憶體', 'Modules (n.): 模組', 'Mass production (n.phr.): 量產', 'Bandwidth (n.): 頻寬',
                    'Power efficiency (n.phr.): 能源效率', 'Structural shift (n.phr.): 結構性轉變', 'Primary arbiter (n.phr.): 主要決定因素/仲裁者', 'AI scaling (v.ger.): AI 擴張/規模化',
                    'Sold out (phr.v.): 售罄', 'Binding contracts (n.phr.): 具約束力的合約', 'Cyclical commodity (n.phr.): 週期性大宗商品', 'Strategic Utility (n.phr.): 策略性公用事業',
                    'Memory Wall (n. proper): 記憶體牆', 'Trillion-parameter (adj.): 兆級參數的', 'GTC 2026 (n. proper): 輝達年度技術大會', 'Interconnect (n.): 互連',
                    'Latency (n.): 延遲', 'Packaging (n.): 封裝', 'Yield (n.): 良率', 'Silicon (n.): 矽/晶片',
                    'Foundry (n.): 鑄造廠', 'Strategic (adj.): 戰略的', 'Bilateral (adj.): 雙邊的', 'Infrastructure (n.): 基礎建設',
                    'Expansion (n.): 擴張', 'Resilience (n.): 韌性', 'Unprecedented (adj.): 史無前例的', 'Capacity (n.): 產能',

                ],

                    { q: 'What is the capacity of Micron\'s new HBM4 module?', options: ['8GB', '16GB', '24GB', '36GB'], answer: '36GB' },

                    { q: 'The term "Memory Wall" refers to ______.', options: ['A physical wall in a data center', 'The bottleneck in computer performance caused by slow memory', 'A storage facility', 'A memory loss condition'], answer: 'The bottleneck in computer performance caused by slow memory' },
                    { q: 'What is "power efficiency"?', options: ['Using more power to get faster', 'Doing more work with less electrical power', 'Turning off the lights', 'Charging more money'], answer: 'Doing more work with less electrical power' },
                    { q: 'The word "cyclical" describes something that ______.', options: ['Moves in a straight line', 'Happens in regular repeating cycles', 'Is permanent', 'Is hidden'], answer: 'Happens in regular repeating cycles' },
                    { q: 'What is a "binding contract"?', options: ['A verbal promise', 'A legal agreement that must be followed', 'A book of codes', 'A type of tool'], answer: 'A legal agreement that must be followed' },

                    { q: 'Trillion-parameter models refer to AI of ______ scale.', options: ['Small', 'Massive', 'Minor', 'Theoretical'], answer: 'Massive' },
                    { q: 'Micron is a ______ in memory technology according to the text.', options: ['Follower', 'Technological lead', 'Retailer', 'Regulator'], answer: 'Technological lead' }
                ]
            },
            'fed-pause': {
                title: '聯準會利率維持高位暫停',
                english: `The Federal Reserve (Fed) meets today amidst a "nightmare scenario" of supply-side shocks from the Strait of Hormuz. Markets now expect a pause in rate cuts until at least September. Macroscopically, this signifies the "Institutionalization of the Risk Premium." With U.S. inflation stubbornly above target, the Fed is caught between supporting a softening labor market and preventing a second wave of "War Inflation." This creates a liquidity squeeze that rewards cash-rich tech giants while punishing debt-heavy "zombie" firms.`,
                chinese: `聯準會（Fed）三月會議前瞻：通膨黏性與中東戰火迫使利率維持「高位暫停」\n聯準會今日在荷姆茲海峽（Strait of Hormuz）引發的「供應端衝擊」噩夢情境中召開會議。市場目前預計降息將暫停，至少持續到 9 月。從宏觀角度看，這標誌著「風險溢價（Risk Premium）」的制度化。由於美國通膨頑固地高於目標，聯準會陷入了「支持疲軟的勞動市場」與「防止第二波戰爭通膨」之間的兩難。這造成了流動性緊縮，獎勵了現金充沛的科技巨頭，同時懲罰了高負債的「殭屍企業」。`,
                vocabulary: [
                    'Federal Reserve (Fed) (n. proper): 聯準會', 'Nightmare scenario (n.phr.): 噩夢情境', 'Supply-side shocks (n.phr.): 供應端衝擊', 'Pause (n./v.): 暫停',
                    'Rate cuts (n.phr.): 降息', 'Institutionalization (n.): 制度化', 'Risk Premium (n.phr.): 風險溢價', 'Stubbornly (adv.): 頑固地',
                    'Softening labor market (n.phr.): 疲軟的勞動市場', 'War Inflation (n.phr.): 戰爭通膨', 'Liquidity squeeze (n.phr.): 流動性緊縮', 'Cash-rich (adj.): 現金充足的',
                    'Debt-heavy (adj.): 高負債的', 'Zombie firms (n.phr.): 殭屍企業 (指僅靠貸款生存)', 'Target (n.): 目標', 'Strait of Hormuz (n. proper): 荷姆茲海峽',
                    'PCE Inflation (n.phr.): 個人消費支出通膨', 'Refinancing (v.ger.): 再融資', 'Instability (n.): 不穩定', 'Recalibration (n.): 重新校準',
                    'Volatility (n.): 波動性', 'Disinflation (n.): 通膨減緩', 'Benchmark (n.): 基準', 'Commodity (n.): 商品',
                    'Equities (n.): 股票/權益', 'Structural (adj.): 結構性的', 'Constraint (n.): 限制', 'Yield (n.): 殖利率',
                    'Consolidation (n.): 鞏固', 'Prerequisite (n.): 前提條件', 'Verification (n.): 驗證', 'Discourse (n.): 論述'
                ],
                quiz: [
                    { q: 'What is the current market expectation for Fed rate cuts?', options: ['Immediate cuts', 'A pause until at least September', 'A sharp increase', 'Daily changes'], answer: 'A pause until at least September' },
                    { q: 'What "nightmare scenario" is the Fed facing?', options: ['Low food prices', 'Supply-side shocks from the Strait of Hormuz', 'Too many jobs', 'Peace in the Middle East'], answer: 'Supply-side shocks from the Strait of Hormuz' },
                    { q: 'U.S. inflation is described as being ______ above target.', options: ['Slightly', 'Stubbornly', 'Never', 'Accidentally'], answer: 'Stubbornly' },
                    { q: 'The Fed is caught between supporting the labor market and preventing what?', options: ['Technological growth', 'A second wave of "War Inflation"', 'New office building', 'Higher taxes'], answer: 'A second wave of "War Inflation"' },
                    { q: 'What kind of firms are being "punished" by the liquidity squeeze?', options: ['Cash-rich tech giants', 'Debt-heavy "zombie" firms', 'Small farming local shops', 'Only banks'], answer: 'Debt-heavy "zombie" firms' },
                    { q: 'What kind of firms are being "rewarded" in this environment?', options: ['New startups with no money', 'Cash-rich tech giants', 'Zombies', 'Failing airlines'], answer: 'Cash-rich tech giants' },
                    { q: 'The term "Risk Premium" being institutionalized means what?', options: ['Risk is lower than before', 'Higher costs due to risk have become a permanent feature', 'No more risks exist', 'Taxes on insurance'], answer: 'Higher costs due to risk have become a permanent feature' },
                    { q: 'The labor market is described as "softening," which means ______.', options: ['Gaining many new jobs', 'Becoming weaker/Losing momentum', 'Staying perfect', 'Growing fast'], answer: 'Becoming weaker/Losing momentum' },
                    { q: 'A "liquidity squeeze" refers to what in finance?', options: ['Too much cash available', 'A shortage of available cash or credit', 'Making orange juice', 'Selling gold'], answer: 'A shortage of available cash or credit' },
                    { q: 'What is a "zombie firm"?', options: ['A firm that makes horror movies', 'A company that can only pay interest on debt but not principal', 'A successful startup', 'A state-owned bank'], answer: 'A company that can only pay interest on debt but not principal' },
                    { q: 'What month is mentioned as the potential earliest for rate cuts?', options: ['March', 'June', 'September', 'December'], answer: 'September' },
                    { q: 'The Fed "meets today," which refers to which meeting?', options: ['G7', 'UN', 'FOMC/Fed policy meeting', 'TSMC Board'], answer: 'FOMC/Fed policy meeting' },
                    { q: 'What is the "nightmare" source of shocks?', options: ['The Pacific Ocean', 'The Strait of Hormuz', 'The Panama Canal', 'The North Pole'], answer: 'The Strait of Hormuz' },
                    { q: 'The word "institutionalization" means ______.', options: ['Making something a part of an established system', 'Ending a company', 'Buying a building', 'Ignoring a rule'], answer: 'Making something a part of an established system' },
                    { q: 'U.S. inflation is above the "______," which is usually around 2%.', options: ['Ceiling', 'Target', 'Floor', 'Window'], answer: 'Target' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-focus'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${data.title}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz.length;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1] || ''}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
