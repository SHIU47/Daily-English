                title: '台灣本地焦點',
                english: `[1] Leading State Banks Evaluate Cross-Border "Compute-Settlement" for CBDC\nFollowing pilot outcomes from Project mBridge, Taiwan’s leading state-owned lenders — Bank of Taiwan and Mega International Commercial Bank — are assessing wholesale CBDC integration for real-time settlement of high-value semiconductor and ICT exports. Macroscopically, adopting a DLT-based settlement framework could reduce reliance on correspondent banking networks, reinforcing transactional sovereignty in cross-border chip trade.\n\n[2] Wealth Concentration: 124,000 Taiwanese Surpass NT$100M in Assets\nA newly released domestic wealth survey shows 124,000 Taiwanese individuals now hold over NT$100 million in investable assets, largely driven by sustained gains in semiconductor and AI equities. Macroscopically, this high-net-worth cohort is accelerating growth in private banking, but the “K-shaped” divergence intensifies policy pressure on housing affordability.\n\n[3] MOFA Confirms Final Evacuation of Stranded Citizens Amid Middle East Conflict\nTaiwan’s Ministry of Foreign Affairs confirmed that the final group of Taiwanese citizens stranded in Israel and Iran has safely reached Jordan. The successful evacuation underscores Taiwan’s independent diplomatic crisis response capability amid escalating geopolitical volatility.`,
                chinese: `【1】台銀與兆豐銀評估「數位新台幣」跨境算力支付與結算\n繼「多邊央行數位貨幣橋（Project mBridge）」試點成果後，台灣兩大公股銀行——台灣銀行與兆豐銀行——正評估批發型中央銀行數位貨幣（CBDC）的整合，用於高價值半導體與資通訊（ICT）出口的即時結算。從宏觀角度看，採用基於分散式帳本技術（DLT）的結算框架，可減少對代理行網路的依賴，使台灣核心出口產業免受匯率波動與金融瓶頸的影響，同時強化跨境晶片貿易的「交易主權」。\n\n【2】台灣資本市場新氣象：12.4 萬人擁有億元以上資產\n一份最新公布的國內財富調查顯示，全台已有 12.4 萬人持有超過 1 億元新台幣的可投資資產，這主要受到半導體與 AI 相關股票持續上漲的推動。科技霸權帶來的資本增值週期從結構上重塑了資產分配。從宏觀角度看，這一高淨值客群正加速私人銀行與多元化投資的成長。然而，「K 型」分化也加劇了住房負擔能力及社會基礎建設的政策壓力，特別是對於在通膨房價中掙扎的 22 至 35 歲專業人士。\n\n【3】外交部通報：受中東衝突影響之最後一批滯留台民平安撤離\n台灣外交部（MOFA）證實，最後一批滯留在以色列與伊朗的台灣公民已安全抵達約旦。這次成功的撤離行動凸顯了台灣獨立的外交危機應對能力。從宏觀角度看，這強化了在地緣政治衝突升級時的制度韌性，同時突顯了中東局勢動盪如何直接影響與台灣出口經濟相關的航線、貨運保險及全球物流鏈。`,

            'epic-fury': {
                title: '中東安全新常態',
                english: `Aftermath of "Operation Epic Fury": The New Normal for Maritime Security\nFollowing coordinated strikes by the United States and Israel on Iranian military infrastructure, the region has entered sustained high-alert status. Iran’s Islamic Revolutionary Guard Corps (IRGC) has threatened commercial shipping through the Strait of Hormuz — a corridor responsible for roughly 20% of global oil transit. Macroscopically, the crisis has embedded a structural “geopolitical risk premium” into global energy pricing. The shift from containment to active disruption is forcing shipping insurers and energy-importing nations to reassess supply chain redundancy and maritime security frameworks.`,

                    'Geopolitical risk premium (n.phr.): 地緣政治風險溢價', 'Energy pricing (n.phr.): 能源定價', 'Containment (n.): 圍堵/遏制', 'Active disruption (n.phr.): 主動中斷/干擾',

                title: '美光 HBM4 戰略分配',
                english: `Micron Confirms 2026 HBM4 Capacity Fully Allocated: The Strategic Memory Squeeze\nMicron Technology confirmed that its entire 2026 HBM4 production capacity has been pre-allocated to three hyperscale clients. The move reflects a broader transformation of advanced memory from cyclical commodity to strategic infrastructure asset. Macroscopically, while this secures Micron’s margin visibility, it also creates a “compute chokepoint,” raising entry barriers for smaller AI labs unable to secure high-bandwidth memory necessary for trillion-parameter model training.`,
                chinese: `美光確立 2026 年 HBM4 產能全數分配：記憶體之「戰略物資化」\n美光科技（Micron Technology）證實，其 2026 年所有的 HBM4 產量已被預先分配給三家超大規模（hyperscale）客戶。此舉反映了先進記憶體正從傳統的週期性大宗商品，轉型為「策略性基礎設施資產」。從宏觀角度看，這雖然確保了美光的利潤可見性，但也造成了「運算瓶頸（compute chokepoint）」，提高了小型 AI 實驗室的准入門檻，因為他們將無法取得訓練兆級參數模型所需的關鍵高頻寬記憶體。`,
                vocabulary: [

                    'Cyclical commodity (n.phr.): 週期性大宗商品', 'Infrastructure asset (n.phr.): 基礎設施資產', 'Margin visibility (n.phr.): 利潤可見性', 'Compute chokepoint (n.phr.): 運算瓶頸',
                    'Entry barriers (n.phr.): 准入門檻/障礙', 'Trillion-parameter model (n.phr.): 兆級參數模型', 'High-bandwidth (adj.): 高頻寬的', 'Production capacity (n.phr.): 產能',
                    'Pre-allocated (v.pp.): 預先分配的', 'Transformation (n.): 轉型', 'Secures (v.): 確保/獲得', 'Visibility (n.): 可見性',
                    'Chokepoint (n.): 瓶頸/阻塞點', 'Commodity (n.): 商品', 'Strategic (adj.): 戰略的', 'Constraint (n.): 限制',

                ]
            },
            'oil-surge': {
                title: '原油跳漲與能源衝擊',
                english: `Brent Crude Surges on Middle-East Turmoil: Strait of Hormuz Risks Target $120\nBrent crude prices surged 13% to a 14-month high of $82 per barrel following tanker attacks near the Strait of Hormuz, with analysts projecting a potential spike toward $120 should disruptions escalate. Macroscopically, the situation represents a supply-side energy shock that threatens to reverse the global disinflation trend. For capital markets, the shift drives defensive rotation into energy-linked assets while compressing margins for airlines and logistics operators — effectively imposing a “growth tax” on energy-importing economies.`,
                chinese: `布蘭特原油跳漲 13%：荷姆茲海峽局勢引發「1970 年代式」能源衝擊\n在荷姆茲海峽附近發生油輪遭襲擊事件後，布蘭特原油價格飆升 13% 至 82 美元的 14 個月新高。分析師預測，若衝突進一步升級，油價可能飆升至 120 美元。從宏觀角度看，此一局勢代表了典型的「供應端能源衝擊」，威脅到全球「去通膨化（disinflation）」的趨勢。對資本市場而言，這促使資金轉向能源相關資產進行防禦，同時也壓縮了航空公司與物流業者的利潤空間，實際上是對能源進口型經濟體徵收了一種「成長稅」。`,
                vocabulary: [
                    'Brent Crude (n. proper): 布蘭特原油', 'Turmoil (n.): 動盪/騷亂', 'Surged (v.pt.): 飆升', 'Tanker attacks (n.phr.): 油輪襲擊',
                    'Per barrel (phr.): 每桶', 'Spike (v./n.): 激增/突升', 'Disruptions (n.): 中斷/干擾', 'Escalate (v.): 升級',
                    'Supply-side shock (n.phr.): 供應端衝擊', 'Disinflation trend (n.phr.): 去通膨化趨勢', 'Capital markets (n.phr.): 資本市場', 'Defensive rotation (n.phr.): 防禦性輪動',
                    'Energy-linked assets (n.phr.): 能源相關資產', 'Compressing margins (phr.): 壓縮利潤/邊際', 'Logistics operators (n.phr.): 物流業者', 'Growth tax (n.phr.): 成長稅',
                    'Energy-importing (adj.): 能源進口的', 'Price surge (n.phr.): 價格飆升', 'Instability (n.): 不穩定', 'Recalibration (n.): 重新校準',
                    'Volatility (n.): 波動性', 'Disinflation (n.): 通膨減緩', 'Benchmark (n.): 基準', 'Commodity (n.): 商品',
                    'Airlines (n.): 航空公司', 'Structural (adj.): 結構性的', 'Inflation (n.): 通膨', 'Asset (n.): 資產',
                    'Margin (n.): 利潤/邊際', 'Imposing (v.ger.): 徵收/強加', 'Projecting (v.ger.): 預計', 'Potential (adj.): 潛在的'
                ],
                quiz: [
                    { q: 'How much did Brent crude prices surge following the tanker attacks?', options: ['5%', '10%', '13%', '25%'], answer: '13%' },
                    { q: 'What was the recorded price per barrel of Brent crude?', options: ['$50', '$64', '$82', '$120'], answer: '$82' },
                    { q: 'Analysts project oil could reach what price if disruptions escalate?', options: ['$85', '$100', '$120', '$200'], answer: '$120' },
                    { q: 'The situation is described as a ______-side energy shock.', options: ['Demand', 'Supply', 'Government', 'Financial'], answer: 'Supply' },
                    { q: 'What global economic trend is threatened by rising oil prices?', options: ['Increasing debt', 'Disinflation trend', 'Tourism growth', 'Technology boom'], answer: 'Disinflation trend' },
                    { q: 'Which sectors are seeing their "margins compressed" (profits reduced)?', options: ['Software and Hardware', 'Airlines and logistics operators', 'Farming and Fishing', 'Arts and Fashion'], answer: 'Airlines and logistics operators' },

                    { q: 'The word "surged" means ______.', options: ['Dropped suddenly', 'Rose suddenly and powerfully', 'Stayed exactly the same', 'Vanished'], answer: 'Rose suddenly and powerfully' },

                    { q: 'Energy-importing economies refer to countries that ______.', options: ['Sell oil to the world', 'Buy oil from other countries', 'Do not use oil', 'Only use solar power'], answer: 'Buy oil from other countries' },
                    { q: 'Which strait is mentioned as a risk factor for oil prices?', options: ['Strait of Malacca', 'Strait of Hormuz', 'Strait of Dover', 'Bering Strait'], answer: 'Strait of Hormuz' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-focus'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${data.title}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz.length;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (15 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1] || ''}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
