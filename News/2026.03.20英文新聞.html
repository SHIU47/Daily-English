            'taiwan-combined': {
                title: '台灣本地焦點',
                english: `[1] Taiwan Rejects China’s Energy Security "Reunification" Offer Amid Middle East War\nThe Taiwanese government officially dismissed a proposal from Beijing that promised "energy security" under a "strong motherland" framework. This signifies an escalation in cross-strait cognitive warfare. Macroscopically, Taiwan has successfully diversified its LNG sources to the United States and Australia. This rejection underscores Taipei's institutional resolve to maintain strategic autonomy.\n\n[2] Cabinet Allocates NT$6.25B to Expand Services for Elderly Living Alone\nAs Taiwan enters a "super-aged" society, the Cabinet approved a two-year, NT$6.25 billion plan to enhance care for seniors living alone. The program includes emergency alert subsidies for 70,000 seniors. Macroscopically, thisAddresses the demographic structural shift by building a social safety net to reduce caregiving burdens on the younger professional class.\n\n[3] Smart City Expo and Yushan Forum Showcase Taiwan’s AI and Digital Diplomacy\nThe 2026 Net Zero City Expo and Yushan Forum concluded in Taipei, bringing together leaders from 22 countries. Taiwan is transitioning from a "hardware vendor" to a "solution architect" for global challenges. This "functional diplomacy" creates deep institutional ties that are harder to sever under diplomatic pressure.`,
                chinese: `【1】能源主權之爭：台灣拒絕中國以「統一」換取能源安全的提議\n台灣政府正式回絕了北京方面在一項「強大祖國」框架下承諾提供「能源與資源安全」的提議。這標誌著在美伊衝突引發全球能源危機之際，兩岸認知作戰的升級。從宏觀角度看，台灣已成功實現液化天然氣（LNG）來源多元化，將依賴從卡達轉向美國與澳洲。此次拒絕凸顯了台北維持戰略自主的制度性決心，認為該提議並非外交橄欖枝，而是旨在利用全球供應鏈脆弱性的心理壓力。\n\n【2】內政部撥款 62.5 億元：強化「超高齡社會」與單身長者服務計畫\n隨著台灣步入「超高齡」社會，行政院核定了一項為期兩年、耗資 62.5 億新台幣（約 1.95 億美元）的計畫，以加強對獨居長者的照顧。該計畫包括為 7 萬名長者提供緊急救援連線補助，並擴大送餐服務。從宏觀角度看，此舉旨在應對威脅社會穩定的「人口結構轉型」。透過優先考慮 75 歲以上長者的到府訪視與數位健康監測，政府正建立一套社會安全網，旨在減輕 22 至 35 歲專業族群的經濟與照護負擔。\n\n【3】軟實力與國際參與：2026 智慧城市展與 Yushan Forum 展現 AI 外交\n2026 淨零城市展與史上規模最大的「玉山論壇（Yushan Forum）」本週在台北圓滿落幕，匯集了來自 22 個國家的領袖。活動聚焦於台灣利用 AI 與半導體專業知識推動綠色轉型。從宏觀角度看，台灣正成功從「硬體供應商」轉型為全球挑戰的「方案架構師」。這種「功能性外交」與國際夥伴建立了更深層的制度性聯繫，在中國外交壓力下更難被切斷，有效地擴大了台灣的國際呼吸空間。`,

            },
            'dni-threat-2026': {
                title: '美情報總監 2026 威脅評估',
                english: `Tulsi Gabbard, Director of National Intelligence (DNI), released the 2026 Annual Threat Assessment on Friday, highlighting the rapid development of hypersonic delivery systems by China and Russia designed to bypass U.S. missile defenses. This signifies a move toward "Integrated Deterrence." Macroscopically, the report underscores the fragility of the "Rules-Based Order," as state actors like Iran and North Korea target critical infrastructure. For global governance, this necessitates a shift from passive defense to active "cyber-resilience" and pre-emptive hardening of global communication nodes.`,
                chinese: `美國國家情報總監發布 2026 威脅評估：聚焦中俄導彈與網路攻擊\n國家情報總監（DNI）塔爾西·加巴德（Tulsi Gabbard）週五發布了 2026 年度威脅評估報告，強調中國與俄羅斯正迅速開發旨在繞過美國導彈防禦系統的「極音速（hypersonic）」運載系統。這標誌著防禦策略轉向「整合威懾（Integrated Deterrence）」。從宏觀角度看，該報告凸顯了「基於規則的秩序」之脆弱性，尤其是伊朗與北韓等國家行為者日益針對關鍵基礎設施進行勒索軟體與網路攻擊。對於全球治理而言，這使得策略必須從被動防禦轉向主動的「網路韌性」，以及對全球通訊節點進行先發制人的強化（hardening）。`,
                vocabulary: [

                    'Bypass (v.): 繞過/避開', 'Integrated Deterrence (n.phr.): 整合威懾', 'Fragility (n.): 脆弱性', 'Rules-Based Order (n.phr.): 基於規則的秩序',

                    'Pre-emptive (adj.): 先發制人的', 'Hardening (n.): 強化/硬化 (防禦)', 'Communication nodes (n.phr.): 通訊節點', 'Ransomware (n.): 勒索軟體',
                    'Prioritizing (v.ger.): 優先處理', 'Deterrence (n.): 威懾/震懾', 'Vulnerability (n.): 脆弱性', 'Assault (n.): 攻擊',

            'hedge-fund-rotation': {
                title: '對沖基金轉向：美光獲利爆發',
                english: `Hedge Funds Rotate from NVIDIA to Micron as AI Chip Dynamics Evolve\nProminent fund managers like Israel Englander have reportedly exited NVIDIA positions to acquire shares in Micron Technology. This signifies a transition from "Logic" to "Memory" as the primary value driver in the AI stack. Macroscopically, with NVIDIA’s hardware footprint already mature, capital is seeking the next "bottleneck"—memory bandwidth. This rotation reflects a market consensus that the "Memory Wall" is the most profitable barrier to overcome in the 2026–2027 infrastructure cycle.`,

                english: `Gold Plunges as Hawkish Fed and Resilient Dollar Trigger Mass Liquidation of Safe Havens\nFollowing the Federal Reserve’s refusal to pivot and surprisingly strong U.S. manufacturing data, gold prices plunged over $200 in a single session, breaching the $4,600 mark. Macroscopically, this "flash crash" signals a shift where gold is temporarily losing its "store of value" status to high-yield U.S. Treasuries. This creates a "liquidity trap" where even traditional hedges are sold to meet dollar-denominated obligations, highlighting USD dominance.`,
                chinese: `黃金慘遭「血洗」：失守 4,600 美元關卡，錄得三年來最大單日跌幅\n隨聯準會（Fed）拒絕轉向（pivot）以及出人意料強勁的美國製造業數據，黃金價格在單一交易日內暴跌超過 200 美元，跌破 4,600 美元的關鍵支撐位。從宏觀角度看，這次「閃崩（flash crash）」標誌著一種轉變：黃金暫時失去了其「價值儲存」地位，取而代之的是高收益的美國公債。這創造了一個「流動性陷阱（liquidity trap）」，即使是傳統的對沖資產（如黃金）也被拋售以履行以美元計價的債務義務，凸顯了美元在高利率、高波動地緣環境中的統治地位。`,
                vocabulary: [
                    'Plunges (v.): 暴跌', 'Hawkish (adj.): 鷹派的 (支持高利率)', 'Resilient (adj.): 具韌性的', 'Liquidation (n.): 清算/拋售變現',
                    'Safe havens (n.phr.): 避險資產', 'Single session (n.phr.): 單一交易日', 'Breaching (v.ger.): 跌破/突破', 'Mark (n.): 標記/關卡',
                    'Flash crash (n.phr.): 閃崩', 'Store of value (n.phr.): 價值儲存', 'High-yield (adj.): 高收益的', 'U.S. Treasuries (n.phr.): 美國公債',
                    'Liquidity trap (n.phr.): 流動性陷阱', 'Dollar-denominated (adj.): 以美元計價的', 'Obligations (n.): 義務/債務', 'Dominance (n.): 統治/優勢',
                    'Refusal (n.): 拒絕', 'Pivot (v.): 轉向', 'Volatility (n.): 波動性', 'Instability (n.): 不穩定',
                    'Liquidation (n.): (資產) 清償', 'denominated (v.pp.): 以...命名/計價', 'Hedge (n.): 避險', 'Surprising (adj.): 令人驚訝的',
                    'manufacturing (n.): 製造業', 'critical (adj.): 關鍵的', 'support (n.): 支撐位/支持', 'session (n.): 會議/盤',
                    'temporary (adj.): 暫時的', 'status (n.): 地位/狀態', 'trapping (v.ger.): 陷阱', 'highlighting (v.ger.): 凸顯'
                ],
                quiz: [
                    { q: 'By how much did gold prices drop in a single session?', options: ['$50', '$100', 'Over $200', '$500'], answer: 'Over $200' },
                    { q: 'Gold breached which critical price mark?', options: ['$3,000', '$4,600', '$5,000', '$10,000'], answer: '$4,600' },
                    { q: 'What is gold temporarily losing its "status" as?', options: ['A cheap metal', 'A "store of value"', 'A military weapon', 'A new currency'], answer: 'A "store of value"' },
                    { q: 'What is replacing gold as a preferred safe asset according to the text?', options: ['Bitcoin', 'High-yield U.S. Treasuries', 'Real estate', 'Silver'], answer: 'High-yield U.S. Treasuries' },
                    { q: 'The term "flash crash" refers to ______.', options: ['A slow decline', 'An extremely rapid drop in price', 'A power outage', 'A fast car accident'], answer: 'An extremely rapid drop in price' },
                    { q: 'What kind of US data was "surprisingly strong"?', options: ['Farming data', 'Manufacturing data', 'Tourism data', 'Space data'], answer: 'Manufacturing data' },
                    { q: 'The situation highlights the dominance of which currency?', options: ['Euro', 'Yuan', 'USD (U.S. Dollar)', 'Bitcoin'], answer: 'USD (U.S. Dollar)' },
                    { q: 'What does "liquidation" mean in finance?', options: ['Turning solid gold to liquid', 'Selling assets for cash', 'Buying a new company', 'Closing a factory only'], answer: 'Selling assets for cash' },
                    { q: 'A "hawkish" Fed refers to one that is likely to ______.', options: ['Keep interest rates high', 'Lower interest rates quickly', 'Ignore inflation', 'Print more money'], answer: 'Keep interest rates high' },
                    { q: 'What is a "liquidity trap" mentioned in the text?', options: ['A place with too much water', 'A situation where assets are sold to meet cash obligations', 'A bank robbery', 'A fast trading algorithm'], answer: 'A situation where assets are sold to meet cash obligations' },
                    { q: 'The word "breaching" means ______.', options: ['Repairing', 'Breaking through or falling below a level', 'Supporting', 'Hiding'], answer: 'Breaking through or falling below a level' },
                    { q: 'Traditional "______" are being sold to meet obligations.', options: ['Hedges', 'Factories', 'Offices', 'Schools'], answer: 'Hedges' },
                    { q: 'What does "dollar-denominated" mean?', options: ['Free dollars', 'Expressed or calculated in U.S. Dollars', 'Fake dollars', 'Secret dollars'], answer: 'Expressed or calculated in U.S. Dollars' },
                    { q: 'The word "resilient" is used to describe the ______.', options: ['Gold price', 'U.S. Dollar', 'Oil price', 'Weather'], answer: 'U.S. Dollar' },
                    { q: 'When did the flash crash occur?', options: ['Monday', 'Tuesday', 'Friday', 'The text doesn\'t say the exact day'], answer: 'The text doesn\'t say the exact day (Context is Friday report)' }
                ]
            },
            'compute-backed-securities': {
                title: '算力資產證券化 (ASO)',
                english: `Compute-Backed Securities Gain Institutional Traction as a New Defensive Credit Class\nWall Street has seen the first wave of investment-grade Asset-Backed Securities (ABS) where the collateral is future lease revenue from high-end GPU clusters. This marks the "financialization of compute." Macroscopically, compute capacity is now treated as a stable, yield-generating asset similar to real estate. This provides a stable funding vehicle for the $700 billion infrastructure spending expected from the "Big Five" tech companies in 2026.`,
                chinese: `算力資產證券化 (ASO)：新興金融工具鎖定資料中心長期收益\n華爾街出現了第一波投資級「資產抵押證券（ABS）」，其抵押品（collateral）是來自高端 GPU 集群的未來租賃收益。這標誌著「算力的金融化（financialization of compute）」。從宏觀角度看，算力產能現在被視為一種穩定的、能產生收益的資產，類似於房地產或公用事業基礎設施。這為 2026 年預計來自「五大（Big Five）」科技公司 7,000 億美元的基礎設施支出提供了一個穩定的融資工具，同時為機構投資者提供了一個進入 AI 超級週期的低波動切入點。`,
                vocabulary: [
                    'Compute-Backed Securities (n.phr.): 算力抵押證券', 'Institutional Traction (n.phr.): 機構吸引力/動能', 'Defensive Credit Class (n.phr.): 防禦性信用類別', 'Asset-Backed Securities (ABS) (n. proper): 資產抵押證券',
                    'Collateral (n.): 抵押品', 'Future lease revenue (n.phr.): 未來租賃收益', 'GPU clusters (n.phr.): GPU 集群', 'Financialization (n.): 金融化',
                    'Yield-generating (adj.): 產生收益的', 'Utility infrastructure (n.phr.): 公用事業基礎設施', 'Funding vehicle (n.phr.): 融資工具', 'Big Five (n. phr.): 五大科技巨頭 (MAMAA/FAANG等)',
                    'Infrastructure spending (n.phr.): 基礎設施支出', 'Super-cycle (n.): 超級週期', 'Investment-grade (adj.): 投資級的', 'Capacity (n.): 產能',
                    'Securities (n.): 證券', 'Traction (n.): 牽引/推動力', 'Collateral (adj.): 併行的', 'Financialize (v.): 金融化',
                    'Stable (adj.): 穩定的', 'Revenue (n.): 收入', 'Architecture (n.): 架構', 'Deployment (n.): 部署',
                    'Efficiency (n.): 效率', 'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑', 'Investment (n.): 投資',
                    'Billion (n.): 十億', 'Constraint (n.): 限制', 'Scalability (n.): 可擴展性', 'Infrastructure (n.): 基礎建設'
                ],
                quiz: [
                    { q: 'What is the collateral for the new wave of Asset-Backed Securities (ABS) on Wall Street?', options: ['Residential houses', 'Future lease revenue from high-end GPU clusters', 'Oil reserves', 'Gold bars'], answer: 'Future lease revenue from high-end GPU clusters' },
                    { q: 'This development marks the "______ of compute."', options: ['Hacking', 'Financialization', 'Destruction', 'Sale'], answer: 'Financialization' },
                    { q: 'Compute capacity is now being treated similarly to which other asset class?', options: ['Toys', 'Real estate or utility infrastructure', 'Used cars', 'Agricultural seeds'], answer: 'Real estate or utility infrastructure' },
                    { q: 'How much infrastructure spending is expected from the "Big Five" in 2026?', options: ['$10 billion', '$100 billion', '$700 billion', '$1 trillion'], answer: '$700 billion' },
                    { q: 'What does this provide for institutional investors?', options: ['High risk only', 'A lower-volatility entry point into the AI super-cycle', 'Free computers', 'No taxes'], answer: 'A lower-volatility entry point into the AI super-cycle' },
                    { q: 'The new securities are described as "______-grade."', options: ['Speculative', 'Investment', 'Low', 'Unknown'], answer: 'Investment' },
                    { q: 'A "funding vehicle" is a ______.', options: ['Fast truck', 'Method or structure used to raise money for a project', 'Space shuttle', 'Type of electric car'], answer: 'Method or structure used to raise money for a project' },
                    { q: 'What does "collateral" mean in finance?', options: ['A type of agreement', 'Asset pledged as security for a loan', 'A coworker', 'Total profit'], answer: 'Asset pledged as security for a loan' },
                    { q: 'The "Big Five" refers to large ______ companies.', options: ['Oil', 'Technology', 'Farming', 'Banking'], answer: 'Technology' },
                    { q: 'What is a "security" in this context?', options: ['A bodyguard', 'A tradable financial asset', 'A door lock', 'A secret password'], answer: 'A tradable financial asset' },
                    { q: 'The term "yield-generating" means an asset that ______.', options: ['Loses money', 'Produces a financial return or income', 'Is broken', 'Uses a lot of power'], answer: 'Produces a financial return or income' },
                    { q: 'The term "ASO" stands for "Compute-Backed ______."', options: ['Options', 'Securities', 'Operations', 'Offsets'], answer: 'Securities' },
                    { q: 'Wall Street is seeing the "first ______" of these securities.', options: ['Wall', 'Wave', 'Hole', 'End'], answer: 'Wave' },
                    { q: 'Institutional ______ means large organizations are interested.', options: ['Friction', 'Traction', 'Avoidance', 'Boredom'], answer: 'Traction' },
                    { q: 'ASO is considered a new "______ credit class."', options: ['Aggressive', 'Defensive', 'Zero', 'Risky'], answer: 'Defensive' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz.length;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 border-l-8 border-blue-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-slate-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-slate-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
