                title: '台灣本地焦點',
                english: `[1] Taiwan and Japan Sign Landmark Mutual Aid Pact for Critical Semiconductor Materials\nTaipei and Tokyo signed an agreement to prioritize the exchange of photoresists and high-purity chemicals during logistics disruptions. This represents a formalization of the "Japwan" tech alliance. Macroscopically, this pact reduces the "Single Point of Failure" risk associated with the Taiwan Strait, ensuring chip fabrication remains liquid even under kinetic threats.\n\n[2] AIDC Secures Technology Transfer Agreement with Global Drone Leaders for Local Production\nAerospace Industrial Development Corporation (AIDC) confirmed a partnership to manufacture high-end "loitering munitions" in Taiwan. This industrial shift aims to localize the entire production cycle of asymmetric defensive systems. Macroscopically, this represents the "Indigenization of Defense Intelligence" by building a self-sustaining defense-industrial base.\n\n[3] Market Reacts to Nuclear Revival; Solar and Wind Stocks Face Valuation Re-Rating\nFollowing the announcement of Nuclear 2 and Nuclear 3 restart applications, domestic renewable energy stocks have experienced intense volatility. Macroscopically, this highlights a transition toward "Energy Realism," balancing immediate national security (nuclear) with long-term climate sustainability (renewables).`,
                chinese: `【1】區域供應鏈安全：台日簽署「關鍵半導體材料」供應鏈互助協議\n為強化區域供應鏈應對中東動盪的韌性，台北與東京簽署了一項協議，優先在物流中斷期間交換光阻劑與高純度化學品。這代表了「台日（Japwan）」技術聯盟的正式化。從宏觀角度看，此協議建立了東北亞的高韌性走廊，降低了與台海相關的「單點故障」風險，確保即使全球傳統航線面臨持續的武力威脅，晶片製造的物理組件仍能維持流動。\n\n【2】國防產能擴張：漢翔與國際無人機巨頭簽署技術移轉協議\n漢翔航空工業（AIDC）證實了一項新的合作夥伴關係，將在台灣製造高端「巡飛彈（自殺式無人機）」。這項產業轉向旨在將不對稱防禦系統的整個生產週期在地化。從宏觀角度看，這代表了「國防情報本土化」。透過將外國感測技術與本地製造結合，台灣正建立一個不易受國際出口管制或物流封鎖影響的自給自足國防工業基地，有效地將國內生產線維護的「豪豬防禦」制度化。\n\n【3】能源政策餘波：核電重啟計畫引發綠能產業鏈與環團高度關注\n隨賴總統宣布核二、核三廠重啟申請後，國內再生能源類股經歷了劇烈波動，投資者正重新評估台灣的長期能源結構。機構分析師指出，雖然核能提供穩定的基載電力，但達成「2025 淨零」目標仍需大規模擴張風能與太陽能產能。這凸顯了向「能源現實主義」的轉型，政府正試圖在緊急國安（核能）與長期氣候永續（綠能）之間取得平衡。`,

            'trump-iran-ultimatum': {
                title: '特朗普對伊最後通牒',
                english: `President Trump issued a stark 48-hour ultimatum to the Iranian government on Sunday, demanding the immediate cessation of hostile maritime activities. Reports from Washington indicate the administration is weighing military action to occupy or blockade Kharg Island — Iran's primary oil export terminal — to force the reopening of the Strait of Hormuz. Macroscopically, this escalation has institutionalized a "War Premium" in energy markets. For global governance, it represents a shift from diplomatic containment to direct military interventionism, forcing energy-dependent nations in Asia and Europe to brace for sustained supply shocks while the United States Navy attempts to re-establish maritime dominance in the Persian Gulf.`,

                title: '特斯拉與台積電 A16 合約',
                english: `Elon Musk confirmed yesterday that Tesla’s proprietary "AI5" architecture will be built exclusively on TSMC’s A16 (1.6nm) node. This industrial shift targets the integration of backside power delivery for massive performance gains in future Robotaxis and Optimus humanoid units. Macroscopically, this cements the "Verticalization of Intelligence." By bypassing merchant silicon and securing the world's most advanced fabrication capacity, Tesla is attempting to build a "Robotic Sovereign" that controls its own neural-engine supply chain, insulating itself from broader market pricing volatility.`,

                    'Robotaxi (n.): 自駕計程車', 'Humanoid units (n.phr.): 人形機器人單位', 'Verticalization (n.): 垂直化', 'Bypassing (v.ger.): 繞過',

                chinese: `聯準會利率路徑劇震：交易員預期 10 月加息機率升至 50%\n聯準會政策轉向被逆轉：隨近期鷹派數據以及能源引發的「戰爭通膨（War Inflation）」，市場參與者已激進地重新定價聯準會的政策軌跡。這代表了 2026 年「降息說（Rate Cut narrative）」的全面瓦解。從宏觀角度看，年底加息的前景標誌著「流動性陷阱（Liquidity Trap）」的制度化。對於全球專業人士而言，這意味著資金成本將長期維持在限制性水準，這有利於現金充沛的大型企業，同時懲罰高度依賴債務的新創公司。`,

                    'Signifies (v.): 標誌著', 'Liquidity Trap (n. proper): 流動性陷阱', 'Cost of capital (n.phr.): 資金成本', 'Restrictive (adj.): 限制性的',

            },
            'gold-slump': {
                title: '黃金白銀開盤走低',
                english: `Spot gold prices fell $25 at the market open today, reaching $4,486 per ounce. This signifies the "Collapse of the Safe Haven" narrative in a high-interest-rate environment. Macroscopically, the "Flash Crash" in precious metals is driven by the realization that the Federal Reserve may hike rates later this year. This creates a liquidity squeeze where investors rush into the USD, treating the greenback—rather than gold—as the ultimate store of value during the current Middle East conflict. Silver and other commodities have mirrored this downward trend as global capital seeks dollar-denominated safety.`,
                chinese: `黃金與白銀開盤走低：現貨金跌至 4486 美元，連跌紀錄創 1983 年以來之最\n黃金與白銀在週一開盤暴跌；現貨金價今日開盤下跌 25 美元，觸及每盎司 4,486 美元。這標誌著在高利率環境下，「避險天堂（Safe Haven）」論述的瓦解。從宏觀角度看，貴金屬的「閃崩（Flash Crash）」是由於市場意識到聯準會可能在今年晚些時候加息。這造成了流動性緊縮，投資者紛紛湧向美元，在中東衝突期間將美元——而非黃金——視為終極的價值儲存手段。白銀與其他大宗商品也反映了這一跌勢，全球資本正尋求以美元計價的安全資產。`,
                vocabulary: [
                    'Slump (n./v.): 暴跌/衰落', 'Monday Open (n.phr.): 週一開盤', 'Losing streak (n.phr.): 連跌紀錄', 'Spot gold (n.phr.): 現貨黃金',
                    'Per ounce (phr.): 每盎司', 'Signifies (v.): 標誌著/預示', 'Safe Haven (n. phr.): 避險天堂/安全港', 'High-interest-rate (adj.): 高利率的',
                    'Flash Crash (n.phr.): 閃崩', 'Precious metals (n.phr.): 貴金屬', 'Realization (n.): 意識到/實現', 'Hike rates (phr.): 加息',
                    'Liquidity squeeze (n.phr.): 流動性緊縮', 'Greenback (n.): 美鈔/美元', 'Store of value (n.phr.): 價值儲存', 'Ultimate (adj.): 終極的/最終的',
                    'Mirrored (v.pt.): 反映/與...同步', 'Downward trend (n.phr.): 下行趨勢', 'Dollar-denominated (adj.): 以美元計價的', 'Commodities (n.): 大宗商品',
                    'Volatility (n.): 波動性', 'Bullion (n.): 實體金銀', 'Instability (n.): 不穩定', 'Squeeze (v.): 擠壓',
                    'Inventory (n.): 庫存', 'Commodity (n.): 商品', 'Recalibration (n.): 重新校準', 'Asset (n.): 資產',
                    'Deficit (n.): 赤字', 'Premium (n.): 溢價', 'Divergence (n.): 分歧', 'Prerequisite (n.): 前提條件'
                ],
                quiz: [
                    { q: 'What was the spot gold price reaching at the Monday open?', options: ['$4,000', '$4,486', '$5,000', '$5,500'], answer: '$4,486' },
                    { q: 'Gold marks its longest "______ streak" since 1983.', options: ['Winning', 'Losing', 'Stable', 'Trading'], answer: 'Losing' },
                    { q: 'What narrative is "collapsing" in the current environment?', options: ['AI growth', 'Safe Haven', 'Cheap energy', 'Peace'], answer: 'Safe Haven' },
                    { q: 'The "Flash Crash" is driven by the realization of what?', options: ['Rate cut', 'Rate hike later this year', 'Ending USD', 'Buying gold'], answer: 'Rate hike later this year' },
                    { q: 'Investors are rushing into which currency as the "ultimate store of value"?', options: ['Euro', 'Bitcoin', 'USD (the greenback)', 'Yen'], answer: 'USD (the greenback)' },
                    { q: 'What was the drop in gold price at the open?', options: ['$5', '$10', '$25', '$100'], answer: '$25' },
                    { q: 'The situation creates a "______ squeeze."', options: ['Water', 'Liquidity', 'Labor', 'Data'], answer: 'Liquidity' },
                    { q: 'What does "spot gold" mean?', options: ['Gold for 2030', 'Gold for immediate delivery', 'Fake gold', 'Gold coins only'], answer: 'Gold for immediate delivery' },
                    { q: 'The term "greenback" is a nickname for ______.', options: ['US dollar', 'Pound', 'Plant', 'Tax'], answer: 'US dollar' },
                    { q: 'A "losing streak" means prices have ______ for many days.', options: ['Risen', 'Fallen', 'Stayed same', 'Doubled'], answer: 'Fallen' },
                    { q: 'What is a "store of value"?', options: ['A supermarket', 'An asset that maintains purchasing power', 'A price tag', 'A bank only'], answer: 'An asset that maintains purchasing power' },
                    { q: 'Precious metals prices are dropping because investors expect ______.', options: ['Lower interest', 'Higher interest later', 'Peace', 'More gold'], answer: 'Higher interest later' },
                    { q: 'Silver has ______ the downward trend of gold.', options: ['Opposed', 'Mirrored', 'Ignored', 'Stopped'], answer: 'Mirrored' },
                    { q: 'Global capital seeks ______-denominated safety.', options: ['Yuan', 'Euro', 'Dollar', 'Bitcoin'], answer: 'Dollar' },
                    { q: 'The news describes the crash in which day\'s open?', options: ['Friday', 'Monday', 'Wednesday', 'Sunday'], answer: 'Monday' }
                ]

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
