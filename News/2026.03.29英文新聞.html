y personnel is Iran mobilizing?","options":["Ten thousand","One hundred thousand","One million","Ten million"],"answer":"One million"},{"type":"mc","text":"The term \"Mideast\" is a common abbreviation for which region?","options":["Midwest","Middle Earth","Middle East","Mid-Atlantic"],"answer":"Middle East"},{"type":"mc","text":"What do analysts suggest these developments underscore?","options":["Improved diplomatic relations","A peaceful resolution","A concerning escalation","Economic cooperation"],"answer":"A concerning escalation"}]},{"id":4,"title":"中東衝突升級，黃金原油價格劇烈波動，全球市場重定價。 (Mideast Conflict Fuels Gold, Oil Volatility; Global Markets Reprice)","reading":"On March 29, 2026, escalating tensions in the Middle East significantly impacted financial markets worldwide. The ongoing conflict has fueled extreme volatility in commodity prices, with both gold and crude oil experiencing sharp surges. This geopolitical uncertainty is prompting a major reevaluation across global markets, leading to widespread repricing of assets. Investors are closely monitoring the situation as they adjust their portfolios to reflect the new risk landscape and seek safe-haven assets.","vocab":[{"en":"escalating tensions","zh":"緊張局勢升級"},{"en":"significantly impacted","zh":"顯著影響"},{"en":"financial markets","zh":"金融市場"},{"en":"fueled volatility","zh":"加劇波動"},{"en":"commodity prices","zh":"大宗商品價格"},{"en":"crude oil","zh":"原油"},{"en":"sharp surges","zh":"急劇上漲"},{"en":"geopolitical uncertainty","zh":"地緣政治不確定性"},{"en":"reevaluation","zh":"重新評估"},{"en":"global markets","zh":"全球市場"},{"en":"repricing","zh":"重新定價"},{"en":"assets","zh":"資產"},{"en":"investors","zh":"投資者"},{"en":"monitoring","zh":"監測"},{"en":"adjust portfolios","zh":"調整投資組合"},{"en":"risk landscape","zh":"風險格局"},{"en":"safe-haven assets","zh":"避險資產"},{"en":"economic stability","zh":"經濟穩定"},{"en":"supply chain","zh":"供應鏈"},{"en":"Middle East conflict","zh":"中東衝突"}],"quiz":[{"type":"fill","text":"The recent _______________ in the Middle Ea ueled extreme volatility' most closely means:","options":["A) Reduced","B) Caused or intensified","C) Prevented","D) Stabilized"],"answer":"B) Caused or intensified"},{"type":"mc","text":"What kind of assets do investors often seek during times of crisis?","options":["A) High-risk growth stocks","B) Speculative derivatives","C) Safe-haven assets","D) Volatile cryptocurrencies"],"answer":"C) Safe-haven assets"}]},{"id":5,"title":"美股恐慌指數VIX突破30，納指週跌逾3%創近一年最差。 (US VIX Spikes Past 30, Nasdaq Posts Worst Week in a Year)","reading":"Financial markets experienced significant turbulence this week, with investors showing heightened anxiety. The VIX, often referred to as the 'fear gauge,' surged past 30, indicating growing concerns. Consequently, the Nasdaq Composite Index recorded its worst weekly performance in nearly a year, falling over 3%. This downturn reflects broader worries about market stability and the current economic outlook.","vocab":[{"en":"VIX","zh":"恐慌指數"},{"en":"spike (past)","zh":"飆升 (超過)"},{"en":"Nasdaq Composite Index","zh":"那斯達克綜合指數"},{"en":"posts worst week","zh":"創下最差週表現"},{"en":"investor anxiety","zh":"投資人焦慮"},{"en":"financial markets","zh":"金融市場"},{"en":"turbulence","zh":"劇烈波動"},{"en":"fear gauge","zh":"恐慌指標"},{"en":"downturn","zh":"經濟衰退/下跌"},{"en":"market stability","zh":"市場穩定性"},{"en":"volatility","zh":"波動性"},{"en":"benchmark index","zh":"基準指數"},{"en":"sell-off","zh":"拋售潮"},{"en":"rebound","zh":"反彈"},{"en":"economic outlook","zh":"經濟前景"},{"en":"interest rates","zh":"利率"},{"en":"inflation","zh":"通貨膨脹"},{"en":"portfolio","zh":"投資組合"},{"en":"bear market","zh":"熊市"},{"en":"bull market","zh":"牛市"}],"quiz":[{"type":"fill","text":"The VIX is often referred to as the \"fear _________,\" indicating investor sentiment.","answer":"gauge","hint":"一種測量或評估的標準"},{"type":"fill","text":"The Nasdaq Composite Index recorded its worst weekly _________ in nearly a year.","answer":"performance","hint":"表現或業績"},{"type":"fill","text":"A sudden surge in the VIX typically s let aid=0;
function vl(v){return'<ul class="vl divide-y divide-gray-200 border border-gray-200 rounded-lg overflow-hidden">'+v.map(i=>`<li class="flex justify-between items-center p-3 text-sm"><span class="font-medium text-gray-700">${i.en}</span><span class="text-emerald-700 font-semibold">${i.zh}</span></li>`).join('')+'</ul>';}
function ql(q){
let h='<form id="qf" class="space-y-6">';
q.forEach((qi,i)=>{
h+=`<div class="qi" data-i="${i}"><p class="text-lg font-semibold text-gray-800 mb-3">#${i+1}. `;
if(qi.type==='fill'){const p=qi.text.split('_________');h+=`填入 (提示:${qi.hint})</p><div class="flex flex-col md:flex-row items-start md:items-center space-y-2 md:space-y-0 md:space-x-2 mt-2"><span>${p[0]}</span><input type="text" name="q${i}" class="flex-grow p-2 border-2 border-gray-300 rounded-md focus:border-emerald-500" placeholder="答案..."><span>${p[1]||''}</span></div>`;}
else{h+=`${qi.text}</p><div class="space-y-2 mt-2">`;qi.options.forEach((o,j)=>{h+=`<label class="flex items-center p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100"><input type="radio" name="q${i}" value="${o}" class="h-4 w-4 text-emerald-600"><span class="ml-3">${o}</span></label>`;});h+='</div>';}
h+='</div>';
});
h+=`<div class="flex justify-center mt-8 space-x-4">
<button type="button" onclick="chk()" class="px-6 py-3 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700">批改測驗</button>
<button type="button" onclick="rst()" class="px-6 py-3 bg-gray-400 text-white font-bold rounded-lg hover:bg-gray-500">重新開始</button>
</div><div id="qr" class="mt-6 text-center text-xl font-bold p-4 rounded-lg hidden"></div></form>`;
return h;
}
window.chk=function(){
const f=document.getElementById('qf'),r=document.getElementById('qr'),q=A[aid].quiz;
let s=0;
q.forEach((qi,i)=>{
const d=document.querySelector(`.qi[data-i="${i}"]`);
d.classList.remove('ca','wa');
const oh=d.querySelector('.ah');if(oh)oh.remove();
let isOk=false;
if(qi.type==='fill'){const v=f.elements[`q${i}`]?.value?.trim().toLowerCase();isOk=v===qi.answer.trim().toLowerCase();if(!isOk){const p=document.createElement('p');p.className='ah mt-2 text-sm text-red-700';p.innerHTML=`正確: <b>${qi.answer}</b>`;d.appendChild(p);}}
else{const v=f.elements[`q${i}`]?.value;if(v){isOk=v===qi.answer;d.querySelectorAll('label').forEach(l=>{const rd=l.querySelector('input');if(rd.value===qi.answer)l.classList.add('bg-green-100','border-green-500');else l.classList.remove('bg-green-100','border-green-500');});}}
isOk?s++:0;d.classList.add(isOk?'ca':'wa');
});
const pct=s/q.length;
r.textContent=`得分: ${s}/${q.length}`;
r.className='mt-6 text-center text-xl font-bold p-4 rounded-lg '+(pct<.6?'bg-red-200 text-red-800':pct<.9?'bg-yellow-200 text-yellow-800':'bg-green-200 text-green-800');
f.querySelector('button[onclick="chk()"]').disabled=true;
};
window.rst=function(){
document.getElementById('qf').reset();
document.getElementById('qr').className='mt-6 text-center text-xl font-bold p-4 rounded-lg hidden';
document.querySelector('button[onclick="chk()"]').disabled=false;
document.querySelectorAll('.qi').forEach(d=>{d.classList.remove('ca','wa');const h=d.querySelector('.ah');if(h)h.remove();d.querySelectorAll('label').forEach(l=>{l.classList.remove('bg-green-100','border-green-500');});});
};
function render(a){document.getElementById('tc').innerHTML=`<div class="space-y-10">
<section><h2 class="text-2xl font-bold text-gray-800 border-b-2 border-emerald-500 pb-2 mb-4">1. 閱讀</h2><div class="card p-6 border-l-4 border-emerald-400 bg-emerald-50 leading-relaxed">${a.reading}</div></section>
<section><h2 class="text-2xl font-bold text-gray-800 border-b-2 border-emerald-500 pb-2 mb-4">2. 單字 (${a.vocab.length})</h2>${vl(a.vocab)}</section>
<section><h2 class="text-2xl font-bold text-gray-800 border-b-2 border-emerald-500 pb-2 mb-4">3. 練習 (${a.quiz.length})</h2>${ql(a.quiz)}</section>
</div>`;}
function sw(id){aid=id;document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));document.getElementById('tb'+id).classList.add('active');render(A.find(a=>a.id===id));}
window.onload=function(){const n=document.getElementById('tn');A.forEach(a=>{const b=document.createElement('button');b.id='tb'+a.id;b.className='tab-button px-4 py-3 text-sm text-gray-600 transition hover:bg-gray-100';b.textContent=a.title;b.onclick=()=>sw(a.id);n.appendChild(b);});if(A.length)sw(A[0].id);};
</script>
</body>
</html>
