            'taiwan-focus': {
                title: '台灣本地焦點',
                english: `[1] Think Tank Urges Trade Act Amendment to Close Nvidia Chip Re-export Loopholes\nThe Taiwan Economic Democracy Union urged the government to amend the Foreign Trade Act. This follows an indictment alleging $2.5 billion worth of high-end NVIDIA chips were illegally routed to China via Taiwanese intermediaries. Macroscopically, this highlights a critical "Regulatory Gap" that could undermine Taiwan's standing in the "Clean Supply Chain."\n\n[2] MAC Reports Fourfold Increase in Taiwanese Detained in China\nThe Mainland Affairs Council issued a warning, revealing that 221 Taiwanese citizens were missing or detained in China in 2025. This signifies the "Legalization of Hostage Diplomacy" under new anti-secession laws. Macroscopically, this highlights a growing "Political Risk Premium" for cross-strait travel.\n\n[3] Seven NT$10 Million Receipt Prizes Unclaimed; Cloud Invoice Odds Adjusted\nThe Ministry of Finance announced that seven grand prizes from late 2025 remain unclaimed. Simultaneously, the prize structure for cloud invoices is being adjusted to encourage digitization. Macroscopically, this reflects the "Digital Transformation of Fiscal Policy."`,
                chinese: `【1】晶片出口管制漏洞：智庫促修改《貿易法》防堵 NVIDIA 晶片經台轉運中國\n台灣經濟民主連合昨日舉行記者會，敦促政府立即修訂《貿易法》。此前美國司法部的一份起訴書指稱，自 2024 年以來，價值超過 25 億美元的高階 NVIDIA 晶片（包括 H100 和 B200）經由台灣及東南亞中間商非法轉運至中國。從宏觀角度看，這凸顯了一個關鍵的「監管漏洞」，即台灣尚未正式將中國列為這些特定高階 AI 組件的受限地區。若不加以糾正，可能會損害台灣在美國主導的「乾淨供應鏈」中的地位，並導致國內物流公司面臨二次制裁。\n\n【2】台人赴陸風險警訊：陸委會指失蹤與遭拘留案例去年飆升四倍\n陸委會昨日發布新的旅遊警示，透露 2025 年共接獲 221 起台灣公民在中國失蹤或遭拘留的通報。近期案例包括八旗文化總編輯富察被判刑，以及一貫道信徒遭扣押。從宏觀角度看，這標誌著在中國新的反分裂與反間諜法下，「人質外交的合法化」。對於專業人士而言，這凸顯了兩岸往來日益增長的「政治風險溢價」，北京正日益利用任意拘留作為對台灣社會進行心理與政治脅迫的工具。\n\n【3】稅務紅利：雲端發票中獎率調整，統一發票 1000 萬元獎項仍有 7 張未領\n財政部宣布，11-12 月份共有 7 張 1,000 萬元大獎尚未領取，包括基隆一筆僅 173 元的電話費單據。同時，財政部正調整雲端發票的獎金結構，以鼓勵進一步數位化。從宏觀角度看，這反映了「財政政策的數位轉型」。透過激勵使用官方載具 App 與雲端發票，政府不僅在減少紙張浪費，還在為消費分析與稅務合規建立一個更透明、即時的數據庫。`,

                ]

            'middle-east-war': {

                english: `Jin10 reported active air defenses over Tehran early today, while Israeli commanders confirmed that over 750 Hezbollah militants have been killed in an expanded ground offensive. Macroscopically, this signifies a "Decisive Power Shift" in the Levant. The physical dismantling of Hezbollah infrastructure by the IDF is effectively neutralizing Iran’s most potent regional proxy, forcing a radical recalibration of Middle Eastern security dynamics and placing immediate pressure on global energy insurance rates. Markets are bracing for potential Iranian retaliation against maritime assets in the Strait of Hormuz.`,

            'spacex-xai-ipo': {
                title: 'SpaceX 與 xAI 合併上市',
                english: `SpaceX officially filed its confidential S-1 prospectus with the SEC yesterday, March 26. The filing reveals a strategic merger with Musk’s AI firm xAI, valuing the combined entity at $1.25–1.75 trillion. Macroscopically, this represents the "Institutionalization of the Musk Empire." The IPO is pitched as a "Galactic Infrastructure" offering. By merging launch, connectivity, and intelligence, Musk is building a vertically integrated monopoly for the 21st century. Analysts believe the influx of capital will accelerate the 2027 Mars cargo mission timeline.`,

                    'Pitched as (phr.): 定位為/宣傳為', 'Vertically integrated (adj.phr.): 垂直整合的', 'Monopoly (n.): 壟斷', 'Connectivity (n.): 連通性/連網能力',

                title: '美光在台擴產細節',
                english: `Following its blockbuster earnings, Micron Technology confirmed the acquisition of the Tongluo P5 site in Taiwan is now complete. The 570,000-square-foot facility is being rapidly converted to focus exclusively on HBM4 and Gen6 SSD production. Macroscopically, this signifies the "Memory Hegemony" phase of the AI boom. As compute power outpaces memory bandwidth, Micron is locking in multi-year "Strategic Scarcity" contracts, ensuring that its profits are pegged to the $600 billion annual AI infrastructure spending of hyperscalers.`,
                chinese: `美光在台擴產細節：銅鑼廠將於 2028 年進入 HBM4 高產量期\n繼 3 月 18 日公佈重磅財報後，美光科技（Micron）證實已完成對台灣力積電銅鑼 P5 廠區的收購。這座 57 萬平方英尺的設施正被迅速改造，專門用於 HBM4（第四代高頻寬記憶體）與第六代 SSD 的生產。從宏觀角度看，這標誌著 AI 熱潮進入了「記憶體霸權」階段。由於算力增長已超過記憶體頻寬的負荷，美光正藉此鎖定為期數年的「策略性稀缺（Strategic Scarcity）」合約，確保其利潤能直接掛鉤超大規模服務商（hyperscalers）每年 6,000 億美元的 AI 基礎設施支出。`,
                vocabulary: [

                    'Exclusively (adv.): 專門地/獨家地', 'HBM4 (n. proper): 第四代高頻寬記憶體', 'Gen6 SSD (n. proper): 第六代固態硬碟', 'Memory Hegemony (n.phr.): 記憶體霸權',
                    'Outpaces (v.): 超過/領先', 'Memory bandwidth (n.phr.): 記憶體頻寬', 'Strategic Scarcity (n.phr.): 策略性稀缺', 'Binding contracts (n.phr.): 具約束力的合約',
                    'Pegged to (v.phr.): 掛鉤/聯繫到', 'Hyperscalers (n.): 超大規模服務商', 'Infrastructure spending (n.phr.): 基礎設施支出', 'Blockbuster earnings (n.phr.): 轟動的/巨額的財報收益',
                    'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑', 'Resilience (n.): 韌性', 'Unprecedented (adj.): 史無前例的',
                    'Capacity (n.): 產能', 'Deployment (n.): 部署', 'Optimization (n.): 優化', 'Performance (n.): 表現/性能',

                quiz: [

                    { q: 'The term "HBM" refers to which type of memory?', options: ['Hard Disk Drive', 'High-Bandwidth Memory', 'Home Based Media', 'Heated Battery Module'], answer: 'High-Bandwidth Memory' },
                    { q: 'What does "acquisition" mean in business?', options: ['Selling a company', 'Buying or gaining possession of a company/asset', 'Losing money', 'Closing a factory'], answer: 'Buying or gaining possession of a company/asset' },
                    { q: 'The word "converted" in the text means ______.', options: ['Broken', 'Changed in form or function', 'Hidden', 'Painted'], answer: 'Changed in form or function' },
                    { q: 'What is a "hyperscaler"?', options: ['A large scale', 'A massive cloud provider like Google/Amazon', 'A high-speed train', 'A type of telescope'], answer: 'A massive cloud provider like Google/Amazon' },
                    { q: 'What does "pegged to" mean?', options: ['Thrown away', 'Linked or fixed to another value/amount', 'Ignoring', 'Building'], answer: 'Linked or fixed to another value/amount' },
                    { q: 'Blockbuster earnings refers to ______ results.', options: ['Poor', 'Average', 'Highly successful/Huge', 'Secret'], answer: 'Highly successful/Huge' },
                    { q: 'Memory ______ is described as being outpaced by compute power.', options: ['Size', 'Bandwidth', 'Color', 'Price'], answer: 'Bandwidth' },
                    { q: 'Micron Technology is a company primarily focused on ______.', options: ['Clothing', 'Memory and Storage', 'Farming', 'Art'], answer: 'Memory and Storage' }
                ]
            },
            'compute-securities': {
                title: '算力資產證券化 (ASO)',
                english: `Compute-Backed Securities (ASO) Issuance Hits Record High as Data Centers Financialize. Wall Street has seen a surge in investment-grade ABS, where the collateral is the future lease revenue of high-end GPU clusters. Macroscopically, this signifies the "Infrastructure-fication" of AI. Compute assets are now treated with the same credit profile as utility grids. This provides a stable funding vehicle for infrastructure spending while offering institutional investors a lower-volatility entry point.`,
                chinese: `算力資產證券化（ASO）發行量創紀錄：AI 基礎設施成為新興投資級標的\n華爾街見證了投資級「資產抵押證券（ABS）」的激增，其抵押品（collateral）是高端 GPU 集群的未來租賃收益。從宏觀角度看，這標誌著 AI 的「基礎設施化（Infrastructure-fication）」。算力資產現在被視為與公用事業電網或房地產具有相同的信用概況。這為 2026 年所需的巨額基礎設施支出提供了一個穩定的融資工具，同時與傳統科技股相比，為機構投資者提供了一個進入 AI 超級週期的低波動切入點。`,
                vocabulary: [
                    'Compute-Backed Securities (ASO) (n.phr.): 算力抵押證券', 'Issuance (n.): 發行', 'Financialize (v.): 金融化', 'Wall Street (n. proper): 華爾街',
                    'Investment-grade (adj.): 投資級的', 'ABS (Asset-Backed Securities) (n. proper): 資產抵押證券', 'Collateral (n.): 抵押品', 'Lease revenue (n.phr.): 租賃收益',
                    'GPU clusters (n.phr.): GPU 集群', 'Infrastructure-fication (n.): 基礎設施化', 'Credit profile (n.phr.): 信用概況/評等', 'Utility grids (n.phr.): 公用事業電網',
                    'Funding vehicle (n.phr.): 融資工具', 'Institutional investors (n.phr.): 機構投資者', 'Lower-volatility (adj.): 低波動的', 'Entry point (n.phr.): 切入點/進入點',
                    'Securities (n.): 證券', 'Traction (n.): 牽引/推動力', 'Financialize (v.): 金融化', 'Infrastructure (n.): 基礎建設',
                    'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑',
                    'Investment (n.): 投資', 'Billion (n.): 十億', 'Constraint (n.): 限制', 'Scalability (n.): 可擴展性',
                    'Macroeconomically (adv.): 從宏觀經濟上', 'Divergence (n.): 分歧', 'Prerequisite (n.): 前提條件', 'Refining (v.ger.): 提煉'
                ],
                quiz: [
                    { q: 'What is the collateral for the new wave of Asset-Backed Securities (ABS)?', options: ['Oil reserves', 'Future lease revenue of high-end GPU clusters', 'Real estate in New York', 'Gold bars'], answer: 'Future lease revenue of high-end GPU clusters' },
                    { q: 'This development signifies the "______" of AI.', options: ['Destruction', 'Infrastructure-fication', 'Hacking', 'Isolation'], answer: 'Infrastructure-fication' },
                    { q: 'Compute assets are now being compared to which credit profile?', options: ['Farming risk', 'Utility grids or real estate', 'Individual debt', 'Stock options only'], answer: 'Utility grids or real estate' },
                    { q: 'What does this new financial instrument provide for AI spending?', options: ['Higher debt', 'A stable funding vehicle', 'A way to hide money', 'Nothing'], answer: 'A stable funding vehicle' },
                    { q: 'ASO offers institutional investors a ______-volatility entry point compared to tech stocks.', options: ['Higher', 'Lower', 'Zero', 'Extreme'], answer: 'Lower' },
                    { q: 'The word "issuance" refers to the act of ______.', options: ['Buying something', 'Officially giving out or making available for sale (e.g. securities)', 'Closing a business', 'Painting a building'], answer: 'Officially giving out or making available for sale (e.g. securities)' },
                    { q: 'The term "collateral" refers to ______.', options: ['A type of coworker', 'Asset pledged as security for a loan', 'A gift', 'Profit from a sale'], answer: 'Asset pledged as security for a loan' },
                    { q: 'What are "GPU clusters"?', options: ['One computer', 'A group of interconnected graphics processing units', 'A set of car tires', 'A bunch of flowers'], answer: 'A group of interconnected graphics processing units' },
                    { q: 'Wall Street has seen a "______" (sudden increase) in these securities.', options: ['Drop', 'Surge', 'Freeze', 'Stability'], answer: 'Surge' },
                    { q: 'The word "financialize" means to ______.', options: ['Turn into money', 'Convert into a financial instrument or asset', 'Buy food', 'Teach math'], answer: 'Convert into a financial instrument or asset' },
                    { q: 'What does "investment-grade" mean?', options: ['Poor quality', 'High quality and low risk for investment', 'For students only', 'Banned'], answer: 'High quality and low risk for investment' },
                    { q: 'The term "ABS" stands for ______.', options: ['Automatic Brake System', 'Asset-Backed Securities', 'Annual Business Summary', 'American Bank System'], answer: 'Asset-Backed Securities' },
                    { q: 'Institutional ______ means large organizations are interested.', options: ['Traction', 'Avoidance', 'Boredom', 'Failure'], answer: 'Traction' },
                    { q: 'What is a "utility grid"?', options: ['A type of sports map', 'Infrastructure for public services like electricity', 'A software menu', 'A grocery store shelf'], answer: 'Infrastructure for public services like electricity' },
                    { q: 'The news describes ASO as a new "______ ______ class."', options: ['Risky trade', 'Defensive credit', 'Space travel', 'Luxury good'], answer: 'Defensive credit' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            if (result === undefined) {
                document.querySelectorAll('.quiz-option').forEach(el => {
                    const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                    const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                    const optValue = el.innerText.substring(3).replace('✓', '').trim();
                    el.classList.remove('selected');
                    if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
                });
            }
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
