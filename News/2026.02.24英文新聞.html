                english: `[1] TSMC Confirms Installation of Next-Gen Transistor Inspection Tools for A16 at Kaohsiung Fab\nNew progress at the Kaohsiung Nanzi Science Park shows that TSMC has begun installing specialized high-precision inspection tools for the A16 (1.6nm) node. Unlike the 2nm lines, A16 requires unique metrology systems for its backside power delivery architecture. This move ensures that the P3 facility remains on track for risk production in late 2026.\n\n[2] AMD Zen 6 "Olympic Ridge" Details Emerge; TSMC A16 Node to Enable 24-Core "Medusa" CCDs\nLeaked technical specifications for AMD’s Zen 6 architecture suggest that it will utilize TSMC’s A16 process to achieve up to 24 cores per CCD—a significant jump from Zen 5. This performance-per-watt optimization is specifically designed to counter Intel’s 14A roadmap.\n\n[3] NDC Launches Phase 2 of National Smart Health Cloud; 50 Hospitals Achieve AI Record Syncing\nThe National Development Council (NDC) announced that 50 major medical centers in Taiwan have successfully integrated the second phase of the AI-driven Health Cloud. This enables real-time cross-hospital diagnostic data sharing using encrypted AI models, reducing duplicate examinations.`,

                title: 'SpaceX Starship 6 測試成功',
                english: `In a flawless test flight on Tuesday, SpaceX’s Starship 6 achieved its first "Precision Point Landing" on a designated offshore platform. The mission validated upgraded Hot-Staging thrusters and a reinforced heat shield system for deep-space re-entry. According to Elon Musk, the success initiates the official countdown for the 2027 uncrewed Mars cargo mission, which aims to preposition life-support systems. Starship’s full reusability continues to slash the cost per kilogram to orbit, igniting a new "Orbital Gold Rush" as private firms plan commercial space stations.`,
                chinese: `SpaceX「Starship 6」成功完成「精準定點降落」：宣告 2027 火星貨運任務進入倒數。在週二的一次完美試飛中，SpaceX 的「星艦 6 號（Starship 6）」首次在指定的離岸平台上完成了「精準定點降落」。這次任務驗證了升級後的「熱分離（Hot-Staging）」推進器以及用於深空重返大氣層的強化隔熱罩系統。據伊隆·馬斯克表示，這次成功正式開啟了 2027 年無人火星貨運任務的倒數計時，該任務旨在提前佈署維生系統和燃料合成單元。星艦的完全可重複使用性持續大幅削減每公斤入軌成本，在私人企業規劃商業太空站和月球工業風險投資之際，引發了新一輪的「軌道淘金熱」。`,
                vocabulary: [
                    'Starship 6 (n. proper): 星艦 6 號', 'Precision Point Landing (n.phr.): 精準定點降落', 'Designated (adj.): 指定的', 'Offshore platform (n.phr.): 離岸平台',
                    'Validated (v.pt.): 驗證', 'Hot-Staging (n.): 熱分離 (火箭技術)', 'Thrusters (n.): 推進器', 'Reinforced heat shield (n.phr.): 強化隔熱罩',
                    'Deep-space re-entry (n.phr.): 深空重返 (大氣層)', 'Initiates (v.): 啟動/開始', 'Countdown (n.): 倒數計時', 'Uncrewed (adj.): 無人的',
                    'Mars cargo mission (n.phr.): 火星貨運任務', 'Preposition (v.): 提前佈署', 'Life-support systems (n.phr.): 維生系統', 'Fuel-synthesis (n.phr.): 燃料合成',
                    'Full reusability (n.phr.): 完全可重複使用性', 'Slash the cost (phr.): 大幅削減成本', 'Orbital Gold Rush (n.phr.): 軌道淘金熱', 'Lunar industrial ventures (n.phr.): 月球工業風險投資',
                    'Flawless (adj.): 完美的/無暇的', 'Thruster (n.): 螺旋槳/推進器', 'Orbital (adj.): 軌道的', 'Ignite (v.): 點燃/引發',
                    'Preposition (v.): 介詞/預置', 'Synthesis (n.): 合成', 'Reusability (n.): 可重用性', 'Preach (v.): 宣揚',
                    'Stellar (adj.): 星級的', 'Logistics (n.): 物流/後勤', 'Pre-visualization (n.): 預視覺化', 'Infrastructure (n.): 基礎建設'
                ],
                quiz: [
                    { q: 'Which Starship test flight successfully completed the point landing on Tuesday?', options: ['Starship 1', 'Starship 3', 'Starship 5', 'Starship 6'], answer: 'Starship 6' },
                    { q: 'Where did the Starship 6 land?', options: ['In the desert', 'On a designated offshore platform', 'At the launch pad', 'In the mountains'], answer: 'On a designated offshore platform' },
                    { q: 'What specific propulsion technology was validated in this mission?', options: ['Nuclear propulsion', 'Hot-Staging thrusters', 'Electric fans', 'Steam engines'], answer: 'Hot-Staging thrusters' },

                    { q: 'What is the primary goal of the uncrewed Mars mission?', options: ['To find aliens', 'To preposition life-support systems', 'To take photos only', 'To bring back Martian soil'], answer: 'To preposition life-support systems' },

                    { q: 'The mission was "flawless," meaning it was ______.', options: ['Full of errors', 'Perfect/Without mistakes', 'Very slow', 'Secretly failed'], answer: 'Perfect/Without mistakes' },
                    { q: 'What is "fuel-synthesis"?', options: ['Buying fuel', 'Creating fuel from other substances', 'Burning fuel', 'Selling fuel'], answer: 'Creating fuel from other substances' },
                    { q: 'The term "uncrewed" means a mission has ______.', options: ['No fuel', 'No humans on board', 'No target', 'No budget'], answer: 'No humans on board' },
                    { q: 'What does "offshore" mean?', options: ['Deep in the forest', 'Away from the coast/at sea', 'On the beach', 'Underground'], answer: 'Away from the coast/at sea' },
                    { q: 'SpaceX is aiming for Mars "cargo" missions. What is cargo?', options: ['People', 'Goods or equipment carried by a vehicle', 'Fuel only', 'Rocket parts'], answer: 'Goods or equipment carried by a vehicle' },
                    { q: 'Starship 6 achieved "precision point landing," meaning it ______.', options: ['Crashed randomly', 'Landed exactly where it was supposed to', 'Missed the platform', 'Landed in the wrong country'], answer: 'Landed exactly where it was supposed to' },
                    { q: 'The cost per ______ to orbit is being slashed.', options: ['Mile', 'Gram', 'Kilogram', 'Pound'], answer: 'Kilogram' }
                ]
            },
            'tesla-fsd-v13': {
                title: '特斯拉 FSD v13 自動停車',
                english: `Tesla previewed its upcoming FSD v13 "Any-Scene Autopark" capability on Tuesday. Unlike current systems that rely on clearly marked lanes, the upgrade leverages Embodied Spatial Logic to navigate unstructured, narrow urban environments. The system can predict pedestrian movement and even communicate via external speakers to negotiate right-of-way during maneuvers. This enhancement is central to Tesla’s "Robotaxi Readiness" strategy, addressing the "last-meter" disengagement challenge. Analysts view this focus on niche environmental complexity as Tesla’s key competitive differentiator.`,
                chinese: `特斯拉預告 FSD v13「全場景自動停車」：利用具身智能解決高難度窄巷停車。特斯拉週二預覽了即將推出的 FSD v13「全場景自動停車（Any-Scene Autopark）」功能。與目前依賴清晰標線的系統不同，這次升級利用了「具身空間邏輯（Embodied Spatial Logic）」來導航非結構化、狹窄的城市環境（如忙碌的廚房或雜亂的車間）。該系統能預測行人動作，甚至能透過外部喇叭通訊，在操作過程中協商先行權（Right-of-way）。這項增強功能是特斯拉「自駕計程車就緒（Robotaxi Readiness）」策略的核心，解決了自動駕駛中最常見的「最後一米」接管挑戰。分析師認為，這種對利基環境複雜性的關注是特斯拉在叫車網路發布前的關鍵競爭優勢。`,
                vocabulary: [
                    'FSD (Full Self-Driving) (n. proper): 全自動駕駛', 'Any-Scene Autopark (n.phr.): 全場景自動停車', 'Capability (n.): 能力/功能', 'Marked lanes (n.phr.): 標線車道',
                    'Leverages (v.): 利用/槓桿', 'Embodied Spatial Logic (n.phr.): 具身空間邏輯', 'Unstructured environments (n.phr.): 非結構化環境', 'Narrow urban (adj.phr.): 狹窄城市的',
                    'Predict (v.): 預測', 'Pedestrian movement (n.phr.): 行人動作', 'External speakers (n.phr.): 外部喇叭', 'Negotiate (v.): 協商/談判',
                    'Right-of-way (n.): 先行權/路權', 'Maneuvers (n.): (車輛)操作/動作', 'Enhancement (n.): 增強/提升', 'Robotaxi Readiness (n.phr.): 自駕計程車就緒狀態',
                    'Last-meter (adj.): 最後一米的', 'Disengagement (n.): 脫離/接管 (指自駕失效)', 'Competitive differentiator (n.phr.): 競爭差異化優勢', 'Niche complexity (n.phr.): 利基/局部複雜性',
                    'Embodied (adj.): 具身的', 'Spatial (adj.): 空間的', 'Autopark (v.): 自動停車', 'Urban (adj.): 城市的',
                    'Pedestrian (n.): 行人', 'Proactively (adv.): 主動地', 'Collision (n.): 碰撞', 'Autonomous (adj.): 自主的',
                    'Optimization (n.): 優化', 'Humanoid (adj.): 類人的', 'Navigation (n.): 導航', 'Efficiency (n.): 效率'
                ],
                quiz: [
                    { q: 'What is the name of the upcoming Tesla FSD capability?', options: ['Fast Parking', 'Any-Scene Autopark', 'Lane Follower', 'Smart Summon 2.0'], answer: 'Any-Scene Autopark' },
                    { q: 'Which version of FSD is mentioned in the news?', options: ['v10', 'v11', 'v12', 'v13'], answer: 'v13' },
                    { q: 'Unlike old systems, FSD v13 does NOT strictly rely on ______.', options: ['Cameras', 'Marked lanes', 'The internet', 'Battery power'], answer: 'Marked lanes' },
                    { q: 'What is the name of the logic used for narrow environments?', options: ['Embodied Spatial Logic', 'Linear Math', 'Simple Detection', 'Cloud Search'], answer: 'Embodied Spatial Logic' },
                    { q: 'How can the car communicate to negotiate right-of-way?', options: ['Via text message', 'Via external speakers', 'By flashing lights only', 'By calling the police'], answer: 'Via external speakers' },
                    { q: 'This feature is central to which Tesla strategy?', options: ['Solar energy', '"Robotaxi Readiness"', 'Battery recycling', 'Truck design'], answer: '"Robotaxi Readiness"' },
                    { q: 'What is the "last-meter" disengagement challenge?', options: ['The car runs out of gas.', 'The car stops far from the curb.', 'The failure of autonomous systems in final maneuvers.', 'The car drives too fast.'], answer: 'The failure of autonomous systems in final maneuvers.' },
                    { q: 'The system can predict the movement of ______.', options: ['Clouds', 'Pedestrians', 'Stars', 'Prices'], answer: 'Pedestrians' },
                    { q: 'The term "unstructured environment" refers to ______.', options: ['A clean highway', 'Narrow alleys or busy, messy spaces', 'A perfect circle', 'A digital simulation only'], answer: 'Narrow alleys or busy, messy spaces' },
                    { q: 'The word "maneuver" in a driving context means ______.', options: ['To wait', 'A skillful movement or series of actions', 'To break the car', 'To clean the seats'], answer: 'A skillful movement or series of actions' },
                    { q: 'What is a "competitive differentiator"?', options: ['A rule that everyone follows', 'A feature that makes a product stand out from rivals', 'A lower price', 'A type of engine'], answer: 'A feature that makes a product stand out from rivals' },
                    { q: 'The term "Right-of-way" means ______.', options: ['The right to own a car', 'The legal right to proceed before others', 'A long road', 'A map'], answer: 'The legal right to proceed before others' },
                    { q: 'Tesla uses "Embodied AI" which means AI that ______.', options: ['Is only in the cloud', 'Is physically integrated into hardware to interact with the world', 'Only writes text', 'Has no body'], answer: 'Is physically integrated into hardware to interact with the world' },
                    { q: 'FSD v13 "leverages" logic. What does "leverage" mean?', options: ['To hide', 'To use something to maximum advantage', 'To lose', 'To explain'], answer: 'To use something to maximum advantage' },
                    { q: 'Which leader or company is mentioned as the source of this preview?', options: ['NVIDIA', 'Tesla (Elon Musk)', 'Apple', 'Ford'], answer: 'Tesla (Elon Musk)' }
                ]
            }
        };

        // --- STATE MANAGEMENT ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        // --- CORE RENDERING ---
        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${data.title}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-6 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-2xl font-bold text-slate-800 mb-6">${title}</h2><div class="prose max-w-none text-lg text-slate-600 leading-relaxed p-6 bg-slate-50 rounded-xl border border-slate-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-6 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-2xl font-bold text-slate-800 mb-6">${title}</h2><div class="prose max-w-none text-lg text-slate-600 leading-relaxed p-6 bg-blue-50 border-l-4 border-blue-500 rounded-xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-6 py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-3 bg-white rounded-lg shadow-sm border border-slate-100 hover:border-blue-300 transition cursor-default"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-400 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-2xl font-bold text-slate-800 mb-6">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-slate-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${option.replace(/'/g, "\\'")}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-6 bg-white rounded-xl border border-slate-100 shadow-sm"><p class="text-lg font-bold text-slate-800 mb-4">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-8 bg-blue-600 text-white rounded-2xl mb-10 shadow-lg"><h3 class="text-2xl font-bold mb-2">測驗分數</h3><p class="text-5xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-2xl font-bold text-slate-800 mb-6">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-bold rounded-xl shadow-lg hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>提交答案並評分</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '已完成所有作答' : `已回答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
