    <script>

        const NEWS_DATA = {
            'taiwan-combined': {
                title: '台灣本地焦點新聞',
                english: `[1] Innolux Sells Tainan Fab to ChipMOS for NT$880M Amid AI Memory Supercycle\nInnolux announced the sale of its Fab 2 module assembly facility in Tainan to ChipMOS Technologies. The deal reflects Innolux’s strategy to revitalize legacy assets, while ChipMOS urgently expands capacity for AI-related testing and packaging. Macroscopically, this transaction illustrates the “semiconductorization” of Taiwan’s display infrastructure.\n\n[2] Taiwan–Japan Mutual Visits Hit Record 8.2M as Diplomatic Soft Power Peaks\nThe Taiwan-Japan Relations Association reported that mutual visits reached 8.213 million, the highest on record. More than 120 Japanese lawmakers visited Taiwan last year, setting a new benchmark for parliamentary exchanges. Deepening interaction is reinforcing economic ties within a bilateral trade corridor valued at US$84.8 billion.\n\n[3] TAIEX Rebounds 2% as Falling Oil Prices and Trump's Peace Rhetoric Calm Markets\nThe TAIEX rebounded 661 points following a market plunge, supported by a 6% drop in oil prices and conciliatory rhetoric from Donald Trump. TSMC rose 2.21% to NT$1,850. Macroscopically, markets remain in a state of “geopolitical hypersensitivity,” with investors concentrating capital into technology leaders.`,
                chinese: `【1】群創售南科二廠予南茂科技：面板廠資產活化與半導體封裝擴張\n群創宣布將位於台南的二廠模組組裝設施以 8.8 億新台幣售予南茂科技（ChipMOS）。此交易反映了群創活化舊有資產的策略，而南茂則迫切需要擴張 AI 相關邏輯與記憶體晶片的測試與封裝產能。從宏觀角度看，此交易說明了台灣舊有顯示器基礎設施的「半導體化」。隨著 AI 熱潮帶動全球記憶體超級週期，改建設施正成為先進封裝生態系統中的重要節點，確保台灣產業佈局轉向高毛利 AI 運算需求。\n\n【2】台日互訪人次破 821 萬創歷史新高：國會外交與觀光深度綁定\n台灣日本關係協會報告指出，台日互訪人次達到 821.3 萬，創下歷史新高。此外，去年有超過 120 位日本國會議員訪問台灣，為國會交流設定了新基準。從宏觀角度看，這一趨勢反映了台日間軟實力外交的加強。深化的民間互動（有時被稱為「棒球外交」）正強化價值 848 億美元雙邊貿易走廊內的經濟聯繫，同時強化區域觀光與服務業的整合。\n\n【3】台股震盪反彈 661 點：中東局勢緩和與油價重挫引發空單平倉\n在經歷先前的市場暴跌後，台股加權指數反彈 661 點（約 2%），受益於全球油價下跌 6% 以及唐納·川普針對伊朗緊張局勢發表的和解言論。台積電股價上漲 2.21% 至 1,850 元，南亞科則飆升至 10% 漲停板。從宏觀角度看，市場仍處於「地緣政治超敏感」狀態。雖然能源價格下降提供了暫時的緩解，但波動顯示機構投資者正將資金集中於具流動性的科技領先股，而傳統能源與工業股則面臨顯著拋售壓力。`,

                    { q: 'A "supercycle" in memory chips implies a period of ______.', options: ['Low demand', 'Extended high demand and growth', 'Market closure', 'Stable prices'], answer: 'Extended high demand and growth' },
                    { q: 'Taiwan and Japan\'s bilateral trade corridor is valued at ______.', options: ['US$10 billion', 'US$45 billion', 'US$84.8 billion', 'US$1 trillion'], answer: 'US$84.8 billion' }
                ]
            },
            'sk-hynix-applied': {
                title: 'AI 記憶體研發新進展',
                english: `Applied Materials and SK Hynix Launch EPIC Center Partnership for AI Memory R&D\nApplied Materials and SK Hynix have signed a collaboration agreement to develop next-generation HBM-class advanced packaging technologies at the $5 billion EPIC Center in Silicon Valley. The initiative aims to address the “memory bottleneck” limiting AI processor performance. Macroscopically, the partnership highlights the regionalization of high-end semiconductor innovation, with Silicon Valley increasingly serving as the R&D nucleus while manufacturing remains globally distributed. This alliance targets sub-micron precision to ensure future AI clusters can handle trillion-parameter model training.`,
                chinese: `應用材料與 SK 海力士簽署研發協議：加速 HBM 封裝技術革新\n應用材料（Applied Materials）與 SK 海力士已簽署一項合作協議，將在矽谷價值 50 億美元的 EPIC 中心共同研發下一代 HBM 等級的先進封裝技術。該倡議旨在解決限制 AI 處理器效能的「記憶體瓶頸」。從宏觀角度看，這項夥伴關係突顯了高端半導體創新的「區域化（regionalization）」，矽谷日益成為研發核心（nucleus），而製造則保持全球分布。該聯盟鎖定亞微米級的精密度，以確保未來的 AI 集群能處理兆級參數模型的訓練需求。`,
                vocabulary: [
                    'Applied Materials (n. proper): 應用材料 (半導體設備巨頭)', 'EPIC Center (n. proper): EPIC 研發中心', 'Collaboration agreement (n.phr.): 合作協議', 'HBM-class (adj.): HBM 等級的',
                    'Advanced packaging (n.phr.): 先進封裝', 'Memory bottleneck (n.phr.): 記憶體瓶頸', 'Processor performance (n.phr.): 處理器效能', 'Regionalization (n.): 區域化',
                    'R&D nucleus (n.phr.): 研發核心', 'Globally distributed (adj.phr.): 全球分布的', 'Sub-micron precision (n.phr.): 亞微米精密度', 'Trillion-parameter (adj.): 兆級參數的',
                    'Innovation (n.): 創新', 'Alliance (n.): 聯盟', 'Initiative (n.): 倡議/計畫', 'Constraint (n.): 限制',
                    'Redefining (v.ger.): 重新定義', 'Sovereignty (n.): 主權', 'Architecture (n.): 架構', 'Deployment (n.): 部署',

                    'Scalability (n.): 可擴展性', 'High-end (adj.): 高端的', 'Propel (v.): 推進', 'Backbone (n.): 骨幹'
                ],

            'alphabet-meta-edge': {
                title: '邊緣端 AI 與龍頭競爭',
                english: `Alphabet and Meta Pivot Toward Edge AI Inference to Sustain Long-term Moats\nBoth Alphabet and Meta Platforms are shifting their AI strategies toward edge inference, allowing AI models to run closer to users rather than relying entirely on centralized data centers. Meta has demonstrated the use of AI to expand advertising revenue, while Alphabet leverages its full-stack infrastructure and custom silicon advantages. Macroscopically, this development represents the “optimization phase” of the AI boom. Competitive advantage will increasingly depend on companies that can deploy AI at lower costs through proprietary chips.`,
                chinese: `谷歌與 Meta 之「模型競爭」：重點轉向邊緣端 AI 與具體業務增長\n谷歌母公司 Alphabet 與 Meta 平台正將其 AI 策略轉向「邊緣端推論（edge inference）」，讓 AI 模型能更接近用戶運行，而非完全依賴昂貴的集中式數據中心。Meta 已展示利用 AI 擴大廣告收益，而 Alphabet 則槓桿其全棧基礎設施與客製化晶片優勢。從宏觀角度看，這項發展代表了 AI 熱潮的「優化階段」。競爭優勢將日益取決於那些能透過自有晶片與分布式運算架構，以極低成本部署 AI 的公司。`,
                vocabulary: [
                    'Edge AI Inference (n.phr.): 邊緣端 AI 推論', 'Sustain (v.): 維持/支撐', 'Long-term Moats (n.phr.): 長期護城河', 'Centralized (adj.): 集中式的',
                    'Full-stack (adj.): 全棧的/全方位的', 'Custom silicon (n.phr.): 客製化晶片', 'Optimization phase (n.phr.): 優化階段', 'AI boom (n.phr.): AI 熱潮',
                    'Deploy (v.): 部署', 'Proprietary chips (n.phr.): 自有/專有晶片', 'Distributed computing (n.phr.): 分布式運算', 'Inference (n.): 推論',
                    'Alphabet (n. proper): 谷歌母公司', 'Meta Platforms (n. proper): Meta (原 Facebook)', 'Advertising revenue (n.phr.): 廣告營收', 'Moat (n.): 護城河 (競爭優勢)',
                    'Pivot (v./n.): 轉向/樞紐', 'Leverage (v.): 槓桿/利用', 'Competitive advantage (n.phr.): 競爭優勢', 'Infrastructure (n.): 基礎建設',
                    'Constraint (n.): 限制', 'Scalability (n.): 可擴展性', 'Convergence (n.): 匯聚', 'Backlog (n.): 積壓',

                    'Milestone (n.): 里程碑', 'Investment (n.): 投資', 'Logic (n.): 邏輯', 'Divergence (n.): 分歧'

                    { q: 'The current phase of the AI boom is described as the "______ phase."', options: ['Beginning', 'Expansion', 'Optimization', 'Ending'], answer: 'Optimization' },
                    { q: 'Competitive advantage will depend on companies that can deploy AI at ______.', options: ['Higher costs', 'Lower costs', 'Any cost', 'No cost'], answer: 'Lower costs' },
                    { q: 'What does the term "moat" mean in business strategy?', options: ['A water filled hole', 'A sustainable competitive advantage', 'A type of tax', 'A marketing budget'], answer: 'A sustainable competitive advantage' },
                    { q: 'The term "inference" in AI refers to ______.', options: ['Creating the model', 'Running a trained model to make predictions', 'Buying chips', 'Writing the code'], answer: 'Running a trained model to make predictions' },

            'wall-street-outlook': {
                title: '華爾街三月展望與數據',
                english: `Wall Street Braces for CPI Print as Fed’s Bowman Signals Hawkish Caution\nInvestors are closely monitoring upcoming Consumer Price Index (CPI) data and remarks from Michelle Bowman of the Federal Reserve. Current forecasts place CPI growth at approximately 2.4% year-on-year. Macroscopically, markets are entering a phase of renewed macro dependency, balancing war-driven energy volatility against AI-driven productivity gains. The direction of bond yields will strongly influence the global cost of capital through the remainder of 2026. Experts suggest "Higher for Longer" may still be the underlying reality if inflation remains sticky.`,
                chinese: `華爾街三月展望：CPI 數據與聯準會鮑曼講話成為市場焦點\n投資者正密切關注即將公布的消費者物價指數（CPI）數據，以及聯準會官員鮑曼（Michelle Bowman）的言論。目前預測 CPI 年增率約為 2.4%。從宏觀角度看，市場正進入一個「宏觀依賴」的新階段，在戰爭引發的能源波動與 AI 驅動的生產力提升之間尋求平衡。債券殖利率的方向將在 2026 年剩餘時間內強烈影響全球資金成本。專家建議，若通膨依然具有「黏性（sticky）」，「長期高利率（Higher for Longer）」可能仍是潛在的現實。`,
                vocabulary: [
                    'CPI (Consumer Price Index) (n.): 消費者物價指數', 'Braces for (phr.v.): 為...做準備', 'Hawkish (adj.): 鷹派的 (支持高利率)', 'Caution (n.): 謹慎',
                    'Monitoring (v.ger.): 監控/關注', 'Forecasts (n.): 預測', 'Macro dependency (n.phr.): 宏觀依賴', 'Energy volatility (n.phr.): 能源波動',
                    'Productivity gains (n.phr.): 生產力提升', 'Bond yields (n.phr.): 債券殖利率', 'Cost of capital (n.phr.): 資金成本', 'Remainder (n.): 剩餘部分',
                    'Sticky inflation (n.phr.): 黏性通膨', 'Underlying reality (n.phr.): 潛在現實', 'Remarks (n.): 言論/談話', 'Federal Reserve (n. proper): 聯準會',
                    'Benchmark (n.): 基準', 'Divergence (n.): 分歧', 'Prerequisite (n.): 前提條件', 'Refining (v.ger.): 提煉',
                    'Markup (n.): 漲價', 'Stark (adj.): 鮮明的', 'Consolidation (n.): 鞏固', 'Aviation (n.): 航空',
                    'Maritime (adj.): 海事的', 'Constellation (n.): 星座/衛星群', 'Sub-second (adj.): 秒級以下的', 'Latency (n.): 延遲',
                    'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑'
                ],
                quiz: [
                    { q: 'What is the current forecast for CPI growth year-on-year?', options: ['1.5%', '2.4%', '4.3%', '8.68%'], answer: '2.4%' },
                    { q: 'Which Federal Reserve official’s remarks are investors monitoring?', options: ['Jerome Powell', 'Michelle Bowman', 'Kevin Hassett', 'Donald Trump'], answer: 'Michelle Bowman' },

                    { q: 'Investors are "bracing for" the CPI print. What does "bracing for" mean?', options: ['Celebrating', 'Preparing for something difficult or intense', 'Ignoring', 'Deleting'], answer: 'Preparing for something difficult or intense' },
                    { q: 'The term "macro dependency" means markets are highly affected by ______.', options: ['Only small companies', 'Large economic data and policies', 'Only the weather', 'Individual users'], answer: 'Large economic data and policies' },
                    { q: 'What does CPI stand for?', options: ['Consumer Price Index', 'Capital Profit Indicator', 'Corporate Price Increase', 'Central Policy Initiative'], answer: 'Consumer Price Index' },
                    { q: 'What kind of inflation is called "sticky"?', options: ['Inflation that drops fast', 'Inflation that is resistant to change/hard to lower', 'Zero inflation', 'Artificial inflation'], answer: 'Inflation that is resistant to change/hard to lower' },
                    { q: 'The "remainder of 2026" refers to ______.', options: ['The start of the year', 'The time that is left in the year', 'Only the summer', 'Next year'], answer: 'The time that is left in the year' },
                    { q: 'How do "productivity gains" help the economy?', options: ['They lower output', 'They allow more output with the same or less input', 'They increase debt', 'They stop technology'], answer: 'They allow more output with the same or less input' },
                    { q: 'The term "yield" for a bond refers to ______.', options: ['The price of the bond', 'The income return on an investment', 'The size of the paper', 'The name of the bank'], answer: 'The income return on an investment' },
                    { q: 'War-driven energy "volatility" refers to ______.', options: ['Steady energy prices', 'Unpredictable and rapid price changes', 'Free energy', 'Nuclear power only'], answer: 'Unpredictable and rapid price changes' },
                    { q: 'Who is the official mentioned as being "hawkish"?', options: ['Bowman', 'Hassett', 'Musk', 'Cook'], answer: 'Bowman' }
                ]
            },
            'yeong-guan-decline': {
                title: '傳產轉型焦慮：耶格能源新低',
                english: `Yeong Guan Hits All-Time Low as Traditional Energy Manufacturing Faces Structural Decline\nYeong Guan Energy Technology (1589) fell nearly 10%, reaching an all-time low in trading. The decline highlights the growing divergence between traditional heavy industries and the booming technology sector. Macroscopically, the situation reflects “sectoral displacement” in capital markets. Investment capital is rotating aggressively toward AI-driven companies, while legacy industrial firms lacking a clear AI integration or green-energy transition strategy risk sustained valuation compression.`,
                chinese: `耶格能源股價跌至歷史新低：傳產轉型焦慮擴散\n永冠能源科技（Yeong Guan，1589）週三股價重挫近 10%，觸及上市以來的歷史新低。這一跌勢凸顯了傳統重工業與蓬勃發展的高科技產業之間日益加深的「分歧（divergence）」。從宏觀角度看，此一局勢反映了資本市場中的「行業移位（sectoral displacement）」。投資資金正激進地轉向 AI 驅動的科技公司，而缺乏清晰 AI 整合或綠能轉型策略的傳統工業企業，在日益由科技主導的金融環境中，面臨持續的估值壓縮（valuation compression）風險。`,
                vocabulary: [
                    'All-time low (n.phr.): 歷史新低', 'Traditional energy (n.phr.): 傳統能源', 'Structural decline (n.phr.): 結構性衰退', 'Divergence (n.): 分歧/背離',
                    'Heavy industries (n.phr.): 重工業', 'Booming sector (n.phr.): 蓬勃發展的部門', 'Sectoral displacement (n.phr.): 行業移位', 'Capital markets (n.phr.): 資本市場',
                    'Rotating (v.ger.): 輪動/旋轉', 'AI integration (n.phr.): AI 整合', 'Green-energy transition (n.phr.): 綠能轉型', 'Valuation compression (n.phr.): 估值壓縮',
                    'Aggressively (adv.): 激進地/積極地', 'Tech-dominated (adj.): 科技主導的', 'Financial environment (n.phr.): 金融環境', 'Sustained (adj.): 持續的',
                    'Optimization (n.): 優化', 'Infrastructure (n.): 基礎建設', 'Equity (n.): 股權/股票', 'Volatility (n.): 波動',
                    'Constraint (n.): 限制', 'Benchmark (n.): 基準', 'Divergence (n.): 分歧', 'Prerequisite (n.): 前提條件',
                    'Refining (v.ger.): 提煉', 'Incentivize (v.): 激勵', 'Markup (n.): 漲價', 'Consolidation (n.): 鞏固'
                ],
                quiz: [
                    { q: 'What happened to Yeong Guan Energy Technology\'s stock price?', options: ['It reached an all-time high.', 'It fell nearly 10% to an all-time low.', 'It stayed the same.', 'It was bought by NVIDIA.'], answer: 'It fell nearly 10% to an all-time low.' },
                    { q: 'What kind of decline is traditional energy manufacturing facing?', options: ['Temporary', 'Structural', 'Minor', 'Unknown'], answer: 'Structural' },
                    { q: 'There is a growing "______" between traditional heavy industries and tech.', options: ['Agreement', 'Divergence', 'Merger', 'Friendship'], answer: 'Divergence' },
                    { q: 'Capital is "rotating" toward which type of companies?', options: ['Traditional farming', 'AI-driven technology companies', 'Old coal mines', 'Local retail shops'], answer: 'AI-driven technology companies' },
                    { q: 'Legacy industrial firms risk ______ if they lack an AI strategy.', options: ['High profits', 'Valuation compression', 'Free government grants', 'Better reputations'], answer: 'Valuation compression' },
                    { q: 'What is the "green-energy transition"?', options: ['Painting factories green', 'Moving from fossil fuels to renewable energy', 'Buying more oil', 'Ending all energy use'], answer: 'Moving from fossil fuels to renewable energy' },
                    { q: 'The term "sectoral displacement" refers to what in capital markets?', options: ['Building new sectors', 'Capital moving from one sector to another (e.g. legacy to tech)', 'Closing all banks', 'Moving factories overseas'], answer: 'Capital moving from one sector to another (e.g. legacy to tech)' },
                    { q: 'Yeong Guan belongs to which sector?', options: ['Software', 'Traditional heavy industry/Energy manufacturing', 'Fashion', 'Fast food'], answer: 'Traditional heavy industry/Energy manufacturing' },
                    { q: 'What does "valuation compression" mean?', options: ['Increase in stock value', 'Decrease in how much the market is willing to pay for a company', 'Making the company office smaller', 'Reducing the number of employees only'], answer: 'Decrease in how much the market is willing to pay for a company' },
                    { q: 'The market is described as being "tech-______."', options: ['Hating', 'Dominated', 'Avoiding', 'Ignoring'], answer: 'Dominated' },
                    { q: 'The word "rotating" in finance means ______.', options: ['Spinning in circles', 'Shifting investment from one group to another', 'Ending a business', 'Printing money'], answer: 'Shifting investment from one group to another' },
                    { q: 'What is a "heavy industry"?', options: ['Making paper', 'Large-scale manufacturing (e.g. steel, machines)', 'Selling flowers', 'Coding websites'], answer: 'Large-scale manufacturing (e.g. steel, machines)' },
                    { q: 'The word "decline" is a synonym for ______.', options: ['Growth', 'Downfall or decrease', 'Success', 'Start'], answer: 'Downfall or decrease' },
                    { q: 'What does "macroscopically" mean?', options: ['Looking at small details', 'Looking at the large-scale or overall picture', 'Looking at atoms', 'Looking at the past only'], answer: 'Looking at the large-scale or overall picture' },
                    { q: 'Traditional industries lack a clear "AI ______" strategy.', options: ['Exclusion', 'Integration', 'Destruction', 'Hiding'], answer: 'Integration' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz.length;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${option.replace(/'/g, "\\'")}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
