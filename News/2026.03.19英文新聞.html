                title: '台灣本地焦點',
                english: `[1] Taiwan–South Korea Naming Dispute Escalates: MOFA Sets March 31 Deadline\nThe Ministry of Foreign Affairs (MOFA) issued a stern warning to Seoul, demanding that Taiwan's designation on South Korea's e-Arrival card be changed from "China (Taiwan)" to a more appropriate title. If no action is taken by March 31, Taiwan will retaliate by altering the labeling of South Korea on its own online systems. Macroscopically, this friction underscores an "assertive identity" policy to defend international standing.\n\n[2] Analysts Link 20-Day PLAAF Lull to Internal Politics and Fuel Scarcity\nMilitary scholars noted that the PLAAF has ceased sorties into Taiwan’s ADIZ since late February. This "atmospheric pause" is attributed to military purges following China’s "Two Sessions" and fuel conservation due to the Strait of Hormuz blockade. Macroscopically, the MND warns that this "quiet phase" may erode readiness before an asymmetric tactical shift.\n\n[3] Taipei Metro Launches QR Code Single-Journey Tickets to Accelerate Digital Transition\nBeginning March 18, the TRTC officially phased in QR code single-journey tickets, replacing legacy plastic tokens. This shift aims to reduce maintenance costs and integrate mobile payments. Macroscopically, this move reflects the "Digitization of Public Life" in Taiwan, catering to the professional demographic and international travelers.`,
                chinese: `【1】台韓命名爭議升級：外交部限期 3/31 前更正，否則採取對等反制\n外交部（MOFA）昨日向首爾發出嚴厲警告，要求將南韓電子入境卡系統上對台灣的稱呼由「中國（台灣）」更改為更合適的名稱。若 3 月 31 日前未採取更正行動，台灣將採取報復措施，更改其線上入境系統對南韓的標註，可能由「大韓民國」改回「南韓」。從宏觀角度看，這場外交摩擦凸顯了台北日益增長的「積極身份」政策，政府越來越願意利用行政對等原則，在區域旅遊與技術協定中捍衛主權地位。\n\n【2】智庫分析：解放軍台海「戰機靜默」已逾 20 日，政治與能源因素交織\n台北軍事學者指出，自 2 月底以來，共機幾乎完全停止進入台灣防空識別區（ADIZ），創下多年來最長的間歇期。這種「大氣停頓」被歸因於中國「兩會」後的高層軍事清洗，以及因荷姆茲海峽封鎖引發的燃料節約措施。從宏觀角度看，儘管這為台灣攔截機隊提供了短暫喘息，但國防部警告不要因「威脅衰退」而掉以輕心。這種突然的灰色地帶活動真空，可能是旨在侵蝕戒備狀態的戰略「寧靜期」，隨後可能出現不對稱戰術轉向或大規模活動恢復。\n\n【3】台北捷運 3/18 起全面導入 QR Code：智慧票務邁入無紙化里程碑\n從 3 月 18 日起，台北捷運公司（TRTC）正式分階段導入 QR Code 單程票，取代傳統的塑膠代幣。這項技術轉型是更廣泛「智慧交通」計畫的一部分，旨在降低維護成本並更無縫地整合行動支付系統。從宏觀角度看，此舉反映了台灣「公共生活數位化」的趨勢。隨著城市中心轉向無紙化基礎設施，這創造了一個更具韌性、能夠進行即時負載平衡的數據驅動運輸網絡，同時滿足了 22 至 35 歲專業族群與國際旅客的高數位期待。`,

            },
            'fed-rates': {
                title: '聯準會利率決策',
                english: `The Federal Open Market Committee (FOMC) concluded its March meeting by maintaining the benchmark rate at 3.5%-3.75%, citing persistent "Supply-Side Shocks" from the Middle East conflict. Chair Jerome Powell noted that while the labor market is resilient, the risk of a "Second Wave" of inflation from surging energy prices cannot be ignored. This signifies a move toward "Geopolitical Dependency" in monetary policy. Macroscopically, the Fed is signaling a "Higher for Longer" baseline, effectively cooling the 2026 credit cycle and forcing markets to prioritize cash flow over speculative growth.`,
                chinese: `聯準會 (Fed) 利率決策公佈：維持利率不變，鮑爾示警「戰火通膨」長期化\n聯準會公開市場委員會（FOMC）結束三月會議，宣布維持基準利率於 3.5%–3.75% 區間，理由是中東衝突引發的持續性「供應端衝擊」。主席鮑爾指出，儘管勞動力市場具備韌性，但能源價格飆升引發「第二波」通膨的風險不容忽視。這標誌著貨幣政策正轉向「地緣政治依賴型」。從宏觀角度看，聯準會正發出「長期維持高位」的基準信號，有效地冷卻了 2026 年的信貸週期，並迫使市場在今年剩餘時間內，將現金流置於投機性的成長（如 AI 泡沫）之上。`,

                    'Resilient (adj.): 具韌性的', 'Second Wave (n.phr.): 第二波', 'Inflation (n.): 通膨', 'Surging (adj.): 飆升的',

                    'Cooling (v.ger.): 冷卻/降溫', 'Remainder (n.): 剩餘部分', 'Stubbornly (adv.): 頑固地', 'Volatility (n.): 波動',

            'spacex-ipo': {
                title: 'SpaceX IPO 與軌道基建',
                english: `SpaceX IPO Rumors Intensify: Targeting $1.75 Trillion Valuation via Starshield and Orbital Logistics\nReports indicate SpaceX is finalizing its IPO filing, with a valuation target that would make it one of the world's most valuable entities. The primary drivers are the "Starshield" defense program and the "Starlink V3" mesh, which now supports 10 million subscribers. Macroscopically, this represents the "Institutionalization of the Space Economy." A SpaceX listing would provide the liquid capital necessary for interplanetary infrastructure.`,
                chinese: `SpaceX IPO 前夕估值上探 1.75 兆美元：軌道基建與「星盾」防衛成核心動能\n傳聞指出 SpaceX 正完成首次公開募股（IPO）的申報工作，目標估值達 1.75 兆美元，將使其躋身全球最有價值實體之列。核心驅動力為「星盾（Starshield）」國防計畫及「星鏈（Starlink）V3」網路，後者目前已支援 1,000 萬用戶。從宏觀角度看，這代表了「太空經濟的制度化」。SpaceX 的上市將為跨行星基礎設施提供必要的流動資金，有效地將「太空」轉化為機構投資組合中的「公用事業級資產類別」。`,

                ],
                quiz: [
                    { q: 'What is the target valuation for the rumored SpaceX IPO?', options: ['$500 billion', '$1 trillion', '$1.75 trillion', '$5 trillion'], answer: '$1.75 trillion' },

            'global-markets': {
                title: '全球股市與能源市場',
                english: `Global Equities Rebound as Peace Rhetoric Calms Markets; Energy Stocks Outperform\nDespite the broader tech rally, energy stocks like Chevron and Exxon Mobil rose over 1% yesterday as investors hedged against ongoing Hormuz volatility. This signifies a "Dual-Track" market sentiment. Macroscopically, while AI remains the growth story, "Real Assets" are being utilized as a "War Hedge." This suggests that institutional capital is pricing in a permanent "Geopolitical Risk Premium" for the remainder of the 2026 fiscal year.`,
                chinese: `全球股市因中東戰火緩和而反彈：油氣板塊逆勢上揚，雪佛龍大漲 3%\n儘管科技股出現廣泛反彈，但由於投資者針對持續的荷姆茲海峽波動進行避險，雪佛龍（Chevron）與艾克森美孚（Exxon Mobil）等能源股昨日上漲超過 1%。這標誌著市場進入了「雙軌式」情緒。從宏觀角度看，雖然 AI 仍是成長的主軸，但石油、天然氣與黃金等「實體資產」正被用作「戰爭對沖（War Hedge）」。這顯示機構資金不再押注於「重返常態」，而是在 2026 財年的剩餘時間內，將永久性的「地緣政治風險溢價」計入價格中。`,

                    'Energy stocks (n.phr.): 能源股', 'Chevron / Exxon Mobil (n. proper): 雪佛龍/艾克森美孚 (能源巨頭)', 'Hedged against (v.phr.): 對沖/避險', 'Volatility (n.): 波動性',
                    'Signifies (v.): 標誌著/預示', 'Dual-Track (adj.): 雙軌的', 'Market sentiment (n.phr.): 市場情緒', 'Real Assets (n.phr.): 實體資產',
                    'War Hedge (n.phr.): 戰爭對沖', 'Institutional capital (n.phr.): 機構資金', 'Pricing in (phr.v.): 計入(價格/預期)', 'Geopolitical Risk Premium (n.phr.): 地緣政治風險溢價',
                    'Fiscal year (n.phr.): 財年', 'Remainder (n.): 剩餘部分', 'Consolidated (adj.): 綜合的', 'Rally (n.): (股市) 漲勢',
                    'Optimism (n.): 樂觀', 'Sustained (adj.): 持續的', 'Stagnation (n.): 停滯', 'Commodity (n.): 商品',

                ],
                quiz: [
                    { q: 'Which sector outperformed yesterday along with the tech rally?', options: ['Retail', 'Energy stocks', 'Tourism', 'Textiles'], answer: 'Energy stocks' },

                    { q: 'What are "Real Assets" (like oil and gas) being used as?', options: ['A tax', 'A "War Hedge"', 'A gift', 'Waste material'], answer: 'A War Hedge' },

        // --- STATE & RENDERING ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.split('：')[0];
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 border-l-8 border-blue-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-slate-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${option.replace(/'/g, "\\'")}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-slate-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗分數</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>提交答案並評分</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '已完成所有作答' : `已回答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
