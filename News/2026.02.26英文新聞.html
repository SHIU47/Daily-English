                english: `[1] TSMC Signals Mass Production for Silicon Photonics; CPO Packaging for NVIDIA Expected by Late 2026\nTSMC confirmed that its COUPE (Compact Universal Photonic Engine) technology has entered the final verification stage, signaling a countdown to mass production. This Silicon Photonics breakthrough integrates optical interconnects directly into the chip package, significantly reducing power consumption and latency in AI data centers. Industry sources indicate that NVIDIA will be the lead customer, deploying the solution in its 2027 Rubin-Ultra GPUs.\n\n[2] MOEA and Micron Sign MOU to Establish HBM4 Advanced R&D Center in Taiwan\nThe Ministry of Economic Affairs (MOEA) signed an MOU with Micron Technology to expand its R&D footprint in Taiwan. The new facility will focus exclusively on HBM4 development. By leveraging proximity to TSMC’s advanced packaging ecosystem, the initiative ensures next-generation memory-to-logic integration remains anchored in Taiwan.\n\n[3] MODA: Taiwan’s First "Drone AI Detection Grid" Goes Live at Taoyuan Airport\nThe Ministry of Digital Affairs (MODA) deployed a comprehensive AI-driven drone detection network at Taoyuan International Airport. Combining RF sensing with visual AI recognition, the system can automatically identify and neutralize unauthorized UAVs within seconds, protecting air traffic from emerging asymmetric threats.`,

                chinese: `Google 發表「Pixel 11」與「Gemini-Translate」晶片：實現 0.1 秒延遲的「同聲傳譯」。Google 週三揭曉了最新的 Pixel 11 系列，搭載了「Gemini-Translate」專屬晶片。這款專用的 NPU（神經處理單元）針對近乎即時的口譯進行了優化，達到了全球領先的 0.1 秒延遲。在展示中，兩位使用不同語言的人可以自然交談，幾乎沒有任何停頓。與前代產品不同，這款晶片能同時處理音訊訊號、面部微表情以及文化語境，以確保翻譯保留情緒語氣與準確度。Google 計畫在 2026 年底前開放 API 給全球開發者，此舉可能透過完全消除語言障礙，徹底改變觀光與國際商業領域。`,

                english: `Tesla confirmed that its Optimus Gen-3 humanoid robots are now operating in third-party electronics factories as part of a pilot program. The latest version features “Synthetic Skin” tactile sensors, enabling human-level dexterity when handling delicate glass panels and circuit boards. Leveraging the same World Model architecture behind Tesla’s autonomous systems, the robot can navigate unstructured industrial environments independently. If these pilot programs succeed, Tesla plans to begin commercial leasing of the Optimus fleet by late 2026, marking a shift from internal testing to industrial utility.`,

                title: 'SpaceX 衛星直連通訊',
                english: `SpaceX and T-Mobile activated “Starlink Direct-to-Cell” on Wednesday, enabling standard 5G smartphones to connect directly to low-Earth orbit satellites without hardware modification. The service provides full geographic coverage for voice, text, and data—even across oceans and deserts. This milestone introduces true satellite-native roaming, challenging traditional terrestrial carriers and redefining the concept of a global “dead zone.” Regulatory bodies are already reviewing the impact on national spectrum policies.`,
                chinese: `SpaceX 與 T-Mobile 宣佈「Starlink Direct-to-Cell」全球上線：終結全球通訊死角。SpaceX 與 T-Mobile 週三啟用了「Starlink Direct-to-Cell」服務，讓標準 5G 智慧型手機無需任何硬體改裝，即可直接連接低軌道衛星。該服務為語音、簡訊與數據提供全面的地理覆蓋——甚至橫跨海洋與沙漠。這一里程碑引入了真正的「衛星原生漫遊」，挑戰了傳統的地面電信商，並重新定義了全球「通訊死角」的概念。監管機構已開始評估此舉對各國頻譜政策的影響。`,
                vocabulary: [
                    'Direct-to-Cell (adj.phr.): 衛星直連手機', 'Activated (v.pt.): 啟用/激活', 'Standard smartphones (n.phr.): 標準智慧型手機', 'Hardware modification (n.phr.): 硬體改裝',
                    'Low-Earth orbit (LEO) (n.phr.): 低地球軌道', 'Geographic coverage (n.phr.): 地理覆蓋', 'Oceans and deserts (n.phr.): 海洋與沙漠', 'Milestone (n.): 里程碑',
                    'Satellite-native roaming (n.phr.): 衛星原生漫遊', 'Terrestrial carriers (n.phr.): 地面電信商', 'Dead zone (n.phr.): 通訊死角', 'Redefining (v.ger.): 重新定義',
                    'Regulatory bodies (n.phr.): 監管機構', 'Spectrum policies (n.phr.): 頻譜政策', 'Enabled (v.pp.): 使能夠', 'Terrestrial (adj.): 陸地的/地面的',
                    'Constellation (n.): 衛星網', 'Aims to (v.phr.): 旨在', 'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑',
                    'Architecture (n.): 架構', 'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的',

                    { q: 'What does "terrestrial" mean?', options: ['Related to the sea', 'Related to the land or Earth', 'Related to Mars', 'Related to the clouds'], answer: 'Related to the land or Earth' },
                    { q: 'What are "regulatory bodies" doing now?', options: ['Buying SpaceX stock', 'Reviewing impact on national spectrum policies', 'Closing T-Mobile', 'Building their own satellites'], answer: 'Reviewing impact on national spectrum policies' },
                    { q: 'The term "roaming" refers to using your phone ______.', options: ['Only at home', 'Outside your home network coverage', 'While sleeping', 'Without a battery'], answer: 'Outside your home network coverage' },
                    { q: 'What is "spectrum" in a telecommunications context?', options: ['A ghost', 'A range of radio frequencies used for communication', 'A colorful light', 'A type of computer screen'], answer: 'A range of radio frequencies used for communication' },
                    { q: 'The word "activated" means ______.', options: ['Turned off', 'Put into action or use', 'Broken', 'Hidden'], answer: 'Put into action or use' },
                    { q: 'Which company owns the Starlink satellites?', options: ['Amazon', 'Blue Origin', 'SpaceX', 'NASA'], answer: 'SpaceX' },
                    { q: 'The announcement was made on which day?', options: ['Monday', 'Tuesday', 'Wednesday', 'Friday'], answer: 'Wednesday' }
                ]
            },
            'amazon-kuiper-backhaul': {
                title: '亞馬遜衛星 5G 合作',
                english: `Amazon announced partnerships integrating Project Kuiper into global 5G infrastructure on Wednesday. The initiative enables Satellite Backhaul, allowing carriers to extend 5G coverage into remote regions without deploying fiber networks. The collaboration also introduces Satellite Roaming, enabling smartphones to switch seamlessly to satellite connectivity during outages. This positions Amazon as a direct competitor to SpaceX in the race toward 100% global connectivity by decade’s end. Analysts note that Kuiper’s integration with AWS provides a distinct advantage for corporate clients.`,
                chinese: `亞馬遜「Project Kuiper」低軌衛星：與電信商合作提供 5G 備援漫遊服務。亞馬遜週三宣布將其「凱伊博計畫（Project Kuiper）」整合至全球 5G 基礎設施的夥伴關係。該倡議實現了「衛星後端網路（Satellite Backhaul）」，讓電信商無需部署光纖網路即可將 5G 覆蓋擴展到偏遠地區。此次合作還引入了「衛星漫遊」，讓智慧型手機在網路中斷或緊急情況下能無縫切換到衛星連接。這使亞馬遜成為 SpaceX 在「十年內達成 100% 全球連網」競賽中的直接對手。分析師指出，Kuiper 與 AWS 的整合為企業客戶提供了獨特優勢。`,
                vocabulary: [
                    'Project Kuiper (n. proper): 凱伊博計畫', 'Global infrastructure (n.phr.): 全球基礎設施', 'Satellite Backhaul (n.phr.): 衛星後端網路', 'Fiber networks (n.phr.): 光纖網路',
                    'Remote regions (n.phr.): 偏遠地區', 'Satellite Roaming (n.phr.): 衛星漫遊', 'Seamlessly (adv.): 無縫地', 'Satellite connectivity (n.phr.): 衛星連接',
                    'Outages (n.): (服務)中斷', 'Direct competitor (n.phr.): 直接競爭對手', 'Global connectivity (n.phr.): 全球連網', 'Decade’s end (n.phr.): 十年之末',
                    'Distinct advantage (n.phr.): 獨特優勢', 'Corporate clients (n.phr.): 企業客戶', 'Backhaul (n.): 後端傳輸', 'Roaming (n.): 漫遊',
                    'Aviation (n.): 航空', 'Maritime (adj.): 海事的', 'Constellation (n.): 衛星群', 'Latency (n.): 延遲',
                    'Infrastructure (n.): 基礎建設', 'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的',
                    'Milestone (n.): 里程碑', 'Satellite (n.): 衛星', 'Initiative (n.): 倡議', 'Integration (n.): 整合',
                    'Strategy (n.): 策略', 'Sovereignty (n.): 主權', 'Architecture (n.): 架構', 'Seamless (adj.): 無縫的'
                ],
                quiz: [
                    { q: 'What is the name of Amazon\'s satellite project?', options: ['Starlink', 'Project Kuiper', 'Blue Origin', 'Satellite AI'], answer: 'Project Kuiper' },
                    { q: 'What is "Satellite Backhaul" used for?', options: ['Sending satellites back to Earth', 'Extending 5G coverage without fiber networks', 'Repairing broken phones', 'Mining asteroids'], answer: 'Extending 5G coverage without fiber networks' },
                    { q: 'Amazon’s project is being integrated into which global infrastructure?', options: ['4G', '5G', 'Electrical power grid', 'Railway systems'], answer: '5G' },
                    { q: 'What can smartphones do during outages thanks to this collaboration?', options: ['Charge wirelessly', 'Switch seamlessly to satellite connectivity', 'Self-repair', 'Turn into a satellite'], answer: 'Switch seamlessly to satellite connectivity' },
                    { q: 'Who is Amazon’s direct competitor in this field?', options: ['Google', 'SpaceX', 'Apple', 'NVIDIA'], answer: 'SpaceX' },
                    { q: 'The goal is to reach 100% global connectivity by when?', options: ['By next week', 'By 2027', 'By the end of the decade (2030)', 'In 2050'], answer: 'By the end of the decade (2030)' },
                    { q: 'What "distinct advantage" does Kuiper have for corporate clients?', options: ['Cheaper prices', 'Integration with AWS (Amazon Web Services)', 'Better color', 'Free delivery'], answer: 'Integration with AWS (Amazon Web Services)' },
                    { q: 'The term "backhaul" in telecommunications refers to ______.', options: ['Carrying goods on a truck', 'The portion of a network that connects the core to sub-networks', 'A satellite landing', 'Deleting old data'], answer: 'The portion of a network that connects the core to sub-networks' },
                    { q: 'What is an "outage"?', options: ['Going outside', 'A period when a service or power is unavailable', 'A high price', 'A new law'], answer: 'A period when a service or power is unavailable' },
                    { q: 'What are "fiber networks"?', options: ['Networks made of thread', 'High-speed cables that use light to transmit data', 'Radio towers only', 'Old phone wires'], answer: 'High-speed cables that use light to transmit data' },
                    { q: 'The word "seamlessly" means ______.', options: ['With many holes', 'Smoothly and without problems', 'Very slowly', 'Only at night'], answer: 'Smoothly and without problems' },
                    { q: 'What does "remote regions" mean?', options: ['The city center', 'Faraway areas with few people/infrastructure', 'Underground cities', 'Other planets'], answer: 'Faraway areas with few people/infrastructure' },
                    { q: 'The term "roaming" means using a network that is ______.', options: ['Owned by you', 'Not your primary home network', 'Banned', 'Only for emergency'], answer: 'Not your primary home network' },
                    { q: 'Amazon is a "direct ______" to SpaceX.', options: ['Partner', 'Competitor', 'Customer', 'Division'], answer: 'Competitor' },
                    { q: 'Analysts believe integration with ______ is key for Amazon.', options: ['Netflix', 'AWS', 'Spotify', 'Windows'], answer: 'AWS' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${data.title}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (15 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${option.replace(/'/g, "\\'")}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
