            'taiwan-combined': {
                title: '台灣本地焦點',
                english: `[1] Cross-Strait Business Travel Surges 25% Following Restoration of Key Flight Routes\nOne week after the resumption of regular flights to cities like Nanjing and Wuhan, data shows a 25% uptick in business-class bookings. Macroscopically, this signifies the "Normalization of Supply Chain Logistics." Despite political friction, this "Functional Connectivity" acts as a stabilizing economic layer.\n\n[2] First-Time Buyers Surge Ahead of Subsidy Expiration; March Housing Volume Hits 3-Year High\nAs the "New Youth" subsidized mortgage program nears its review period, real estate data shows a massive spike in transactions. Macroscopically, this represents a "Demographic Wealth Pull-Forward." The Central Bank has signaled potential "Macro-prudential Measures" in Q2 to prevent overheating.\n\n[3] Water Scarcity Alert: Reservoirs Fall Below 25% as Hsinchu Science Park Limits Usage\nThe Water Resources Agency upgraded the alert to "Yellow" today. Hsinchu and Tainan Science Parks initiated a 5% voluntary water reduction. Macroscopically, this highlights the "Environmental Ceiling" of the tech industry, necessitating water recycling technologies.`,
                chinese: `【1】兩岸航點擴張後首週：商務往返人數大幅成長 25%\n在恢復南京、武漢等城市定期航班一週後，民航局數據顯示商務艙預訂量增長了 25%。從宏觀角度看，這標誌著「供應鏈物流的正常化」。儘管政治摩擦持續，專業人士與高科技主管正回歸戰前的旅行模式以管理跨岸製造集群。這種「功能性聯通」充當了穩定的經濟層，確保在官方外交管道基本沈默時，必要的技術交流得以持續。\n\n【2】房市動態：新青安貸款政策屆滿前夕，首購族湧現導致三月交易量創高\n隨著當前階段「新青安」補貼貸款計畫接近審核期，房地產數據顯示三月份交易量大幅飆升。從宏觀角度看，這代表了「人口結構財富提前透支（Pull-Forward）」。22 至 35 歲的年輕專業人士在廣泛的通膨擔憂中積極鎖定低利率。然而，央行已暗示這項信用擴張可能在第二季觸發新的「總體審慎措施」，以防止房市過熱並在地緣政治高度波動期動搖金融部門。\n\n【3】環境與資源：全台水情進入「黃燈」警戒，科學園區啟動自主節水\n由於春雨持續缺席，水利署今日正式將水情警報提升至「黃燈」。新竹與台南科學園區已主動啟動非生產用自願節水 5%。從宏觀角度看，這凸顯了科技產業的「環境天花板」。隨著台灣擴張 2 奈米與 HBM 產能，這些先進晶圓廠的海量用水需求正與氣候驅動的稀缺發生衝突。這使得工業水循環技術的制度化加速成為必要，以確保物理資源不成為 AI 成長的首要瓶頸。`,

            'islamabad-talks': {
                title: '中東外交與核透明度',
                english: `Leaked reports from the Pakistan-led summit in Islamabad suggest that Iran has tentatively agreed to restore full IAEA monitoring in exchange for a temporary lifting of sanctions on non-oil exports. Macroscopically, this is "Pragmatic De-escalation." While core Middle East issues remain, this agreement reduces the risk of catastrophic escalation. For global policy, this signals a move toward a "Segmented Peace," where specific technical risks are neutralized even as broader competition continues. Markets remain cautious, awaiting a formal announcement.`,
                chinese: `伊斯蘭堡談判進入深水區：美伊雙方就「核武透明度」達成初步諒解\n從巴基斯坦主持的伊斯蘭堡峰會外洩的報告顯示，伊朗已初步同意恢復國際原子能總署（IAEA）的全方位監控，以換取暫時解除對其非石油產品出口的制裁。從宏觀角度看，這是「務實的降溫（Pragmatic De-escalation）」。雖然中東戰爭的核心問題仍未解決，但核領域的這項協議降低了立即爆發災難性區域升級的風險。對於全球政策而言，這標誌著向「片段式和平（Segmented Peace）」的邁進，即特定的技術性風險被中和，即便更廣泛的地緣政治競爭仍在持續。市場仍保持謹慎，等待正式公告。`,
                vocabulary: [
                    'Leaked (adj.): 洩漏的', 'Summit (n.): 峰會', 'Tentatively (adv.): 暫時地/初步地', 'IAEA (n. proper): 國際原子能總署',
                    'Monitoring (n./v.): 監控', 'Sanctions (n.): 制裁', 'Non-oil exports (n. phr.): 非石油出口', 'Pragmatic (adj.): 務實的',
                    'De-escalation (n.): (緊張局勢)降溫', 'Catastrophic (adj.): 災難性的', 'Neutralized (v.pp.): 中和/抵銷', 'Segmented Peace (n. phr.): 片段式和平',
                    'Transparency (n.): 透明度', 'Diplomatic (adj.): 外交的', 'Breakthrough (n.): 突破', 'Preemptive (adj.): 先發制人的',
                    'Recalibration (n.): 重新校準', 'Verification (n.): 驗證', 'Mandate (n.): 授權/命令', 'Bilateral (adj.): 雙邊的',
                    'Discourse (n.): 論述', 'Sovereignty (n.): 主權', 'Integrity (n.): 完整性', 'Incursion (n.): 入侵',

                    'Strategic (adj.): 戰略的', 'Navigate (v.): 導航/處理', 'Consolidated (adj.): 綜合的', 'Sustained (adj.): 持續的'

                quiz: [

            'micron-hbm-strategy': {
                title: 'AI 記憶體戰略與美光',
                english: `Micron (MU) shares remain near record highs as reports confirm its entire 2026 High-Bandwidth Memory (HBM) supply is committed under fixed-price agreements. Macroscopically, this confirms "Memory as the Strategic Arbiter." As AI logic chips reach physical scaling limits, the bandwidth bottleneck has made HBM the most valuable "Hard Asset" in the semiconductor stack. This transition has turned Micron from a cyclical player into a "Top-Tier Utility," with growth pegged to the physical throughput requirements of AI server buildout.`,
                chinese: `NVIDIA 與美光受益於「推理轉向」：HBM 產能售罄至 2027 年\n美光科技（Micron, MU）股價維持在歷史高位附近，報告證實其 2026 年全數高頻寬記憶體（HBM）供應已在固定價格協議下售罄。從宏觀角度看，這驗證了「記憶體作為策略仲裁者（Strategic Arbiter）」的地位。隨著 AI 邏輯晶片達到物理縮放極限，頻寬瓶頸使得 HBM 成為半導體堆棧中最具價值的「硬資產」。這一轉型使美光從週期性參與者轉變為「頂級公用事業（Top-Tier Utility）」，其成長直接掛鉤於全球 AI 伺服器建設的物理吞吐量需求。`,
                vocabulary: [

                    'Fixed-price agreements (n.phr.): 固定價格協議', 'Strategic Arbiter (n.phr.): 戰略仲裁者', 'Scaling limits (n.phr.): 縮放極限', 'Bandwidth bottleneck (n.phr.): 頻寬瓶頸',
                    'Hard Asset (n. phr.): 硬資產', 'Semiconductor stack (n.phr.): 半導體堆棧', 'Cyclical player (n.phr.): 週期性參與者', 'Top-Tier Utility (n. phr.): 頂級公用事業',
                    'Throughput (n.): 吞吐量/產能速度', 'Buildout (n.): 擴建/建設', 'Pegged to (v.phr.): 掛鉤於', 'Inference (n.): 推論',
                    'Architecture (n.): 架構', 'Optimization (n.): 優化', 'Performance (n.): 性能', 'Capacity (n.): 產能',
                    'Deployment (n.): 部署', 'Efficiency (n.): 效率', 'Sustained (adj.): 持續的', 'Milestone (n.): 里程碑',
                    'Logic chips (n.phr.): 邏輯晶片', 'DRAM (n. abbreviation): 動態隨機存取記憶體', 'Shortage (n.): 短缺', 'Divergence (n.): 分歧',

                ],
                quiz: [
                    { q: 'For which year is Micron\'s HBM supply already fully committed?', options: ['2024', '2025', '2026', '2030'], answer: '2026' },
                    { q: 'What kind of agreements is the HBM supply committed under?', options: ['Variable-price', 'Fixed-price agreements', 'Free gifts', 'Verbal only'], answer: 'Fixed-price agreements' },
                    { q: 'Memory is now described as the "Strategic ______" in AI.', options: ['Enemy', 'Arbiter', 'Tool only', 'Backup'], answer: 'Arbiter' },

                    { q: 'Micron has transitioned from a cyclical player into a "______-______ Utility."', options: ['Low-Tier', 'Top-Tier', 'Temporary', 'Local'], answer: 'Top-Tier' },
                    { q: 'What is growth now pegged to for Micron?', options: ['Price of oil', 'Physical throughput requirements of AI server buildout', 'Consumer phone sales only', 'Food prices'], answer: 'Physical throughput requirements of AI server buildout' },
                    { q: 'What does HBM stand for?', options: ['High Battery Management', 'High-Bandwidth Memory', 'Home Building Module', 'Heavy Binary Method'], answer: 'High-Bandwidth Memory' },

                title: '特斯拉 AI5 與垂直主權',
                english: `Elon Musk confirmed that the proprietary "AI5" processor has cleared initial validation. Designed to power Optimus robots and Robotaxis, the silicon is specifically optimized for vision-based inference. Macroscopically, this is a "Vertical Sovereignty" bet. By designing chips in-house, Tesla aims to decouple its future margins from NVIDIA’s hardware premiums. This signifies a move toward "Application-Specific Silicon Dominance," where hardware becomes a specialized container for proprietary AI models, ensuring 100% control over the intelligence supply chain.`,
                chinese: `特斯拉「Terafab」計畫進度披露：馬斯克稱 AI5 晶片已進入最後驗證階段\n伊隆·馬斯克更新了市場訊息，表示專為 Optimus 機器人與 Robotaxi 設計的專有「AI5」處理器已通過初步驗證。該晶片針對基於視覺的推論（vision-based inference）進行了專門優化。從宏觀角度看，這是一場「垂直主權（Vertical Sovereignty）」的豪賭。透過自研晶片，特斯拉旨在使其未來的利潤與 NVIDIA 的硬體溢價脫鉤。這標誌著向「針對特定應用的晶片主導權（Application-Specific Silicon Dominance）」邁進，硬體成為專有 AI 模型的專用容器，確保對智能供應鏈的 100% 掌控。`,

                    'Intelligence supply chain (n.phr.): 智能供應鏈', 'Cleared (v.pt.): 通過', 'In-house (adj.): 內部的', 'Fabrication (n.): 製造',

                    { q: 'When is volume production of AI5 targeted?', options: ['Early 2026', 'Mid-2027', 'Late 2028', '2030'], answer: 'Mid-2027' }

            },
            'prediction-markets': {
                title: '預測市場與合規調查',
                english: `SDNY Prosecutors are examining AML compliance in decentralized prediction markets, with Polymarket recently added to the scrutiny list. Macroscopically, this marks the "Institutionalization of Information Markets." As prediction platforms become a "Single Source of Truth" for geopolitical risk, regulators aim to impose oversight standards similar to stock exchanges, signaling the end of the "Wild West" era for decentralized intelligence. This forces platforms to choose between global liquidity and U.S. regulatory accessibility.`,
                chinese: `南區聯邦法院調查「預測市場」：Polymarket 列入反洗錢審查名單\n紐約南區（SDNY）檢察官正審查去中心化預測市場的反洗錢（AML）合規性，Polymarket 最近被列入審查名單。從宏觀角度看，這標誌著「資訊市場的制度化（Institutionalization of Information Markets）」。隨著預測平台成為地緣政治風險的「單一事實來源」，監管機構正著手施加與證券交易所類似的監督標準，預示著去中心化情報與政治博弈平台「大西部（Wild West）」時代的結束。這迫使平台在全球流動性與美國監管准入之間做出選擇。`,
                vocabulary: [

                    'Decentralized (adj.): 去中心化的', 'Prediction markets (n.phr.): 預測市場', 'Scrutiny list (n.phr.): 審查名單', 'Institutionalization (n.): 制度化',
                    'Single Source of Truth (n.phr.): 單一事實來源', 'Geopolitical risk (n.phr.): 地緣政治風險', 'Impose (v.): 施加/徵收', 'Oversight standards (n.phr.): 監督標準',
                    'Wild West era (n.phr.): 大西部時代 (指混亂無規則)', 'Liquidity (n.): 流動性', 'Regulatory accessibility (n.phr.): 監管准入', 'Statutes (n.): 法令/法規',
                    'Bets (n.): 賭注', 'Manipulation (n.): 操縱', 'Oversight (n.): 監督', 'Differentiator (n.): 區別因素',
                    'Indispensable (adj.): 不可或缺的', 'Sovereign (adj.): 主權的', 'Monetary (adj.): 貨幣的', 'Inflationary (adj.): 通膨的',
                    'Expansion (n.): 擴張', 'Resilience (n.): 韌性', 'Unprecedented (adj.): 史無前例的', 'Capacity (n.): 容量',
                    'Divergence (n.): 分歧', 'Prerequisite (n.): 前提條件', 'Refining (v.ger.): 提煉', 'Consolidation (n.): 鞏固'
                ],
                quiz: [
                    { q: 'Which organization is investigating AML compliance in prediction markets?', options: ['The UN', 'SDNY Prosecutors', 'NVIDIA', 'The CWA'], answer: 'SDNY Prosecutors' },
                    { q: 'What does "AML" stand for?', options: ['Advanced Machine Learning', 'Anti-Money Laundering', 'Alternative Market Link', 'Annual Money List'], answer: 'Anti-Money Laundering' },
                    { q: 'Which decentralized prediction market was added to the scrutiny list?', options: ['Bitcoin', 'Polymarket', 'Ethereal', 'WallStreetBets'], answer: 'Polymarket' },
                    { q: 'The news marks the "______ of Information Markets."', options: ['Destruction', 'Institutionalization', 'Hiding', 'Randomization'], answer: 'Institutionalization' },
                    { q: 'Prediction platforms are becoming a "Single Source of ______" for geopolitical risk.', options: ['Lies', 'Truth', 'Money', 'Noise'], answer: 'Truth' },
                    { q: 'Regulators aim to impose standards similar to which institutions?', options: ['Public schools', 'Stock exchanges', 'Libraries', 'Farms'], answer: 'Stock exchanges' },
                    { q: 'What era is ending for decentralized intelligence according to the text?', options: ['The Golden Age', 'The "Wild West" era', 'The Stone Age', 'The Space Era'], answer: 'The "Wild West" era' },

                    { q: 'A "prosecutor" is a legal official who ______.', options: ['Defends a criminal', 'Brings a case against a defendant', 'Writes the law', 'Is the judge'], answer: 'Brings a case against a defendant' },

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz ? data.quiz.length : 0;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100 shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl shadow-sm"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    const escapedOption = option.replace(/'/g, "\\'");
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${escapedOption}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            const submitButton = result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${submitButton}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            if (result === undefined) {
                document.querySelectorAll('.quiz-option').forEach(el => {
                    const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                    const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                    const optValue = el.innerText.substring(3).replace('✓', '').trim();
                    el.classList.remove('selected');
                    if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
                });
            }
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
