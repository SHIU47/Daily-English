            'taiwan-combined': {
                title: '台灣本地焦點',
                english: `[1] President Lai Defends Nuclear Restart as "Complementary" to Green Energy Transition\nPresident Lai Ching-te addressed the media to clarify the government’s sudden pivot toward reactivating Nuclear 2 and Nuclear 3. Lai asserted that the decision—driven by the AI industry's power demands and the Iran-U.S. conflict’s impact on LNG—does not abandon sustainability. Macroscopically, this represents a transition to "Energy Pragmatism," where baseload stability is prioritized to safeguard the "Silicon Shield."\n\n[2] Fubon Life to Invest US$20M in Ardian Infrastructure Fund for Global Diversification\nFubon Life announced its plan to commit US$20 million to the ASF IX Infrastructure Fund managed by France’s Ardian. The investment targets "brownfield" infrastructure assets in North America and Europe. Macroscopically, this reflects a trend among institutional investors to hedge against domestic volatility by seeking stable, income-generating real assets abroad.\n\n[3] U.S.-Taiwan Defense Logistics Hub Inaugurated to Speed Up F-16V Maintenance\nA joint maintenance and logistics center officially opened in Taichung today, supported by Lockheed Martin and AIDC. The center aims to perform advanced repairs domestically. Macroscopically, this represents the "Institutionalization of the Taiwan-U.S. Security Tie," significantly increasing the operational readiness of the air force.`,
                chinese: `【1】核電重啟政策引發政治風暴：賴清德強調「核綠並行」不衝突\n賴清德總統週二針對政府突然轉向重啟核二、核三廠一事向媒體做出說明。賴總統強調，這項由 AI 產業激增的電力需求以及美伊衝突對液化天然氣（LNG）供應衝擊所驅動的決定，並未放棄永續發展的目標。從宏觀角度看，這代表向「能源現實主義（Energy Pragmatism）」轉型，基載穩定性現在被置於先前的意識形態時程之上，以在全求供應鏈衝擊中捍衛「矽盾」。\n\n【2】富邦人壽擴張全球基礎設施佈局：獲准投資法商 Ardian 私募基金\n台灣第二大壽險公司富邦人壽今日宣布，計畫向法國 Ardian 管理的 ASF IX 基礎設施基金注資 2,000 萬美元。該投資瞄準北美與歐洲的「開發中（brownfield）」基建資產。從宏觀角度看，此舉反映了台灣機構投資者藉由尋求海外穩定收益的實體資產，來規避國內波動的趨勢。在台幣對地緣政治高度敏感的環境下，這種資本配置強調了壽險業對長期殖利率的需求。\n\n【3】國防外交新進展：美軍售後服務中心在台揭牌，強化 F-16V 即時維修\n隨台灣新一批 F-16V 機隊在美完成測試後，一座聯合維修與物流中心今日在台中正式揭幕。該中心獲得洛克希德·馬丁與本土夥伴漢翔（AIDC）的支持，旨在透過在國內執行高階維修來縮短「維修間隔」。從宏觀角度看，這代表了「台美安全關係的制度化」。台灣正從單純的買家轉變為物流節點，深化了與美國全球國防供應鏈的整合，顯著提升了空軍的作戰就緒率。`,

            'trump-truce': {
                title: '川普推遲空襲伊朗',
                english: `President Trump has instructed the Pentagon to delay military strikes against Iranian energy infrastructure for five days following productive backchannel talks. Macroscopically, this "Tactical Pause" has temporarily defused a potential global energy catastrophe. However, institutional analysts warn that without a "Grand Bargain" regarding the Strait of Hormuz, this lull is merely a recalibration period for both sides. The "War Premium" remains baked into long-term commodity futures, maintaining extreme volatility in the global shipping insurance markets. Both sides are reportedly using this window to reposition naval assets.`,
                chinese: `特朗普推遲對伊朗空襲：雙方就中東衝突達成「五天停火協議」\n在富有成效的秘密管道對話後，川普總統已指示五角大廈將針對伊朗能源基礎設施的軍事打擊延後五天。從宏觀角度看，這次「戰術性暫停（Tactical Pause）」暫時化解了一場潛在的全球能源災難。然而，機構分析師警告，若沒有關於荷姆茲海峽（Strait of Hormuz）局勢的「大交易（Grand Bargain）」，這段間歇期僅是雙方的重新校準期，這使得「戰爭溢價」持續計入長期的商品期貨中，並維持全球航運保險市場的極度波動。據報導，雙方正利用這扇窗口重新佈署海軍資產。`,
                vocabulary: [
                    'Instructed (v.): 指示', 'Pentagon (n. proper): 五角大廈/美國國防部', 'Infrastructure (n.): 基礎建設', 'Backchannel talks (n. phr.): 秘密/非正式管道會談',
                    'Tactical Pause (n. phr.): 戰術性暫停', 'Defused (v. pt.): 化解/拆除(引信)', 'Catastrophe (n.): 災難', 'Institutional analysts (n. phr.): 機構分析師',

                    'Baked into (phr.): 已計入/融入', 'Commodity futures (n. phr.): 商品期貨', 'Shipping insurance (n. phr.): 航運保險', 'Reposition (v.): 重新定位/佈署',
                    'Ultimatum (n.): 最後通牒', 'Ultimatum (n.): 最後通告', 'Maritime (adj.): 海事的', 'Sovereignty (n.): 主權',

            'nvidia-nemoclaw': {
                title: 'NVIDIA NemoClaw 平台',
                english: `NVIDIA unveiled the "NemoClaw" software platform to manage Sovereign AI Agent risks on Wednesday. Following the GTC 2026 conference, NemoClaw acts as an enterprise governance layer for "OpenClaw" agents. This industrial shift targets the "Trust Deficit" in autonomous systems. Macroscopically, NVIDIA is transitioning from a hardware provider to a "Regulatory Platform" architect. By controlling the governance layer, NVIDIA builds a "Digital Moat" for compliance in highly regulated industries like finance and defense.`,
                chinese: `NVIDIA 推出「NemoClaw」企業平台：鎖定代理人 AI 之安全與治理\n繼 GTC 2026 大會之後，NVIDIA 週三推出了「NemoClaw」軟體平台，旨在管理主權 AI 代理人（Agent）的風險。NemoClaw 作為「OpenClaw」代理人的企業級治理層，這一產業轉型鎖定了自主系統中的「信任赤字（Trust Deficit）」。從宏觀角度看，NVIDIA 正從硬體供應商轉型為「監管平台」架構師。透過掌控代理人的治理層，NVIDIA 實際上正在建立一道「數位護城河」，使其硬體不僅是為了效能，更成為金融與國防等高度受監管產業合規性的不可或缺之物。`,

                    'Regulated industries (n. phr.): 受監管產業', 'Finance and defense (n. phr.): 金融與國防', 'Unveiled (v. pt.): 揭幕/公佈', 'Industrial shift (n. phr.): 產業轉移',

            'tesla-ai5-chip': {
                title: '特斯拉 AI5 晶片',
                english: `Elon Musk provided new details on the "AI5" chip on Wednesday, noting it is optimized for the "Optimus" robot and "Cybercab" platforms. This industrial shift aims for "Hardware-Software Synergy." Macroscopically, the move targets the marginal cost of robotic intelligence. If Tesla can produce high-performance inference silicon at a fraction of merchant market prices, it will gain a decisive advantage in the "Physical AI" race, effectively commoditizing the hardware required to automate human-like labor. Volume production is targeted for mid-2027.`,
                chinese: `特斯拉「Terafab」計畫與 AI5 晶片：馬斯克稱其效能將「遠超同儕」\n馬斯克週三提供了關於「AI5」晶片的新細節，指出該晶片已針對「Optimus」機器人與「Cybercab」平台進行優化。這項產業轉向旨在追求「硬體與軟體的協同效應（Synergy）」。從宏觀角度看，此舉瞄準了機器人智能的邊際成本。若特斯拉能以商用市場價格的一小部分，生產出高性能的推論晶片（inference silicon），它將在「實體 AI」競賽中獲得決定性優勢，有效地將自動化類人勞動力所需的硬體「商品化（commoditizing）」。量產目標定於 2027 年年中。`,

                ]
            },
            'market-sensitivity': {
                title: '全球股市與能源風險',
                english: `U.S. equity markets gave back recent gains on Wednesday as uncertainty about the duration of the Iran conflict sent oil prices higher. The S&P 500 slipped 0.8% as investors re-evaluated the "Fragility of the Truce." Macroscopically, this signifies the market's extreme sensitivity to geopolitical soundbites. Investors are rotating back into "Defense and Energy" as a hedge against the possibility that the Fed may be forced into a "Rate Hike" to fight war-driven inflation. This creates a "Binary Risk" environment where policy depends entirely on energy costs.`,
                chinese: `全球股市因中東戰火重啟焦慮而回落：油價重回升勢重創標普 500 指數\n由於對伊朗衝突持續時間的不確定性推高了油價，美國股市週三吐回了近期的漲幅。標普 500 指數下跌 0.8%，投資者正重新評估「停火協議的脆弱性」。從宏觀角度看，這象徵著市場對地緣政治風吹草動（soundbites）的極度敏感。投資者正轉向「國防與能源」板塊進行避險，以應對聯準會可能被迫「加息（Rate Hike）」來對抗戰爭引發之通膨的可能性。這創造了一個「二元風險（Binary Risk）」環境，即政策完全取決於能源成本。`,
                vocabulary: [
                    'Equity markets (n. phr.): 股市/股票市場', 'Gave back gains (phr.): 吐回漲幅', 'Uncertainty (n.): 不確定性', 'Duration (n.): 持續時間',
                    'S&P 500 (n. proper): 標普 500 指數', 'Slipped (v. pt.): 下跌/滑落', 'Fragility (n.): 脆弱性', 'Truce (n.): 停火/休戰',
                    'Geopolitical soundbites (n. phr.): 地緣政治言論/片面資訊', 'Sensitivity (n.): 敏感性', 'Rotating back (v. ger.): 轉向/輪動', 'Hedge (n./v.): 避險/對沖',
                    'Rate Hike (n. phr.): 加息', 'War-driven inflation (n. phr.): 戰爭引發的通膨', 'Binary Risk (n. phr.): 二元風險', 'Sovereign (adj.): 主權的',
                    'Instability (n.): 不穩定', 'Recalibration (n.): 重新校準', 'Volatility (n.): 波動性', 'Disinflation (n.): 通膨放緩',
                    'Benchmark (n.): 基準', 'Commodity (n.): 商品', 'Divergence (n.): 分歧', 'Prerequisite (n.): 前提',
                    'Defense and Energy (n. phr.): 國防與能源板塊', 'Hedge (n.): 對沖', 'Inflation (n.): 通膨', 'Asset (n.): 資產',
                    'Margin (n.): 利潤/邊際', 'Liquidity (n.): 流動性', 'Constraint (n.): 限制', 'Yield (n.): 殖利率'
                ],
                quiz: [
                    { q: 'How did the S&P 500 perform on Wednesday?', options: ['Rose by 2%', 'Slipped 0.8%', 'Stayed the same', 'Hit an all-time high'], answer: 'Slipped 0.8%' },
                    { q: 'What caused oil prices to rise according to the text?', options: ['Lack of demand', 'Uncertainty about the duration of the Iran conflict', 'New solar energy rules', 'A trade deal in Europe'], answer: 'Uncertainty about the duration of the Iran conflict' },
                    { q: 'Investors are re-evaluating the "______ of the Truce."', options: ['Strength', 'Fragility', 'Success', 'End'], answer: 'Fragility' },
                    { q: 'Markets are extremely sensitive to "geopolitical ______."', options: ['History', 'Soundbites', 'Maps', 'Books'], answer: 'Soundbites' },
                    { q: 'Which two sectors are investors rotating into as a hedge?', options: ['Farming and Art', 'Defense and Energy', 'Tech and Retail', 'Gaming and Music'], answer: 'Defense and Energy' },
                    { q: 'What is the "Binary Risk" mentioned related to?', options: ['Weather', 'Policy depending entirely on energy costs', 'A new computer code', 'A sports game result'], answer: 'Policy depending entirely on energy costs' },
                    { q: 'What potential action by the Fed are investors afraid of?', options: ['A 100bps rate cut', 'A "Rate Hike" (increase)', 'Closing all banks', 'Moving to Chicago'], answer: 'A "Rate Hike" (increase)' },

                    { q: 'What does "duration" mean?', options: ['The speed of something', 'The length of time that something continues', 'The cost of something', 'The color of something'], answer: 'The length of time that something continues' },

                    { q: 'The word "slipped" in financial news means the price ______.', options: ['Went up', 'Went down slightly', 'Stayed exactly the same', 'Stopped moving'], answer: 'Went down slightly' },
                    { q: 'What is "war-driven inflation"?', options: ['Price drops caused by peace', 'Rising prices caused by conflict/war supply issues', 'A new type of tax', 'Free oil for everyone'], answer: 'Rising prices caused by conflict/war supply issues' },
                    { q: 'The term "hedge" refers to a strategy to ______.', options: ['Increase risk', 'Reduce or offset potential loss', 'Buy a house', 'Plant a garden'], answer: 'Reduce or offset potential loss' },
                    { q: 'What are "soundbites" in this context?', options: ['Types of music', 'Short clips or sentences of information', 'Long research papers', 'Hidden messages'], answer: 'Short clips or sentences of information' },
                    { q: 'Markets "gave back gains," meaning the prices ______.', options: ['Kept rising', 'Fell after rising previously', 'Were deleted', 'Became zero'], answer: 'Fell after rising previously' }
                ]
            }
        };

        // --- CORE UI LOGIC ---
        let currentTopicId = 'taiwan-combined'; 
        let currentSubTab = 'article'; 
        let quizState = {}; 
        let quizResult = {}; 

        function renderTabs() {
            const tabsContainer = document.getElementById('main-tabs');
            tabsContainer.innerHTML = Object.entries(NEWS_DATA).map(([id, data]) => {
                const isActive = id === currentTopicId ? 'active' : '';
                const displayTitle = data.title.includes('：') ? data.title.split('：')[0] : data.title;
                return `<button class="main-tab-button ${isActive}" onclick="changeTopic('${id}')">${displayTitle}</button>`;
            }).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const data = NEWS_DATA[currentTopicId];
            if (!data) return;
            const quizLength = data.quiz.length;
            const subTabsHTML = `
                <div class="mb-8 flex space-x-2 border-b pb-4 border-slate-100 overflow-x-auto">
                    <button class="sub-tab-button ${currentSubTab === 'article' ? 'active' : ''}" onclick="changeSubTab('article')">📰 英文原文</button>
                    <button class="sub-tab-button ${currentSubTab === 'translation' ? 'active' : ''}" onclick="changeSubTab('translation')">🇹🇼 中文翻譯</button>
                    <button class="sub-tab-button ${currentSubTab === 'vocabulary' ? 'active' : ''}" onclick="changeSubTab('vocabulary')">📚 單字庫 (${data.vocabulary.length})</button>
                    <button class="sub-tab-button ${currentSubTab === 'quiz' ? 'active' : ''}" onclick="initQuiz()">📝 測驗 (${quizLength} 題)</button>
                </div>
            `;
            let contentHTML = '';
            switch (currentSubTab) {
                case 'article': contentHTML = renderArticle(data.english, data.title); break;
                case 'translation': contentHTML = renderTranslation(data.chinese, data.title); break;
                case 'vocabulary': contentHTML = renderVocabulary(data.vocabulary, data.title); break;
                case 'quiz': contentHTML = renderQuiz(currentTopicId, data.quiz, data.title); break;
            }
            contentArea.innerHTML = subTabsHTML + contentHTML;
            if (currentSubTab === 'quiz') updateQuizDisplay(currentTopicId, data.quiz);
        }

        function renderArticle(text, title) {
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-slate-700 leading-relaxed p-6 bg-blue-50 rounded-2xl border border-blue-100"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition" onclick="changeSubTab('translation')">🇹🇼 前往中文翻譯</button></div>`;
        }

        function renderTranslation(text, title) {
            return `<h2 class="text-3xl font-extrabold text-gray-900 mb-6 leading-tight">${title}</h2><div class="prose max-w-none text-lg text-gray-700 leading-relaxed p-6 bg-green-50 border-l-8 border-green-500 rounded-2xl"><p>${text.trim()}</p></div><div class="mt-8 text-center"><button class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition" onclick="changeSubTab('vocabulary')">📖 前往單字庫複習</button></div>`;
        }

        function renderVocabulary(vocabArray, title) {
            const listItems = vocabArray.map(item => {
                const parts = item.split(': ');
                return `<li class="p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition"><span class="font-bold text-blue-700">${parts[0]}</span> <span class="text-slate-500 block text-sm mt-1">${parts[1]}</span></li>`;
            }).join('');
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">核心單字與片語</h2><ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${listItems}</ul><div class="mt-12 text-center"><button class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition" onclick="initQuiz()">📝 開始測驗</button></div>`;
        }

        function renderQuiz(topicId, quizQuestions, title) {
            const currentQuizState = quizState[topicId] || {};
            const result = quizResult[topicId];
            const questionsHTML = quizQuestions.map((q, index) => {
                const selected = currentQuizState[index];
                const isSubmitted = result !== undefined;
                const optionsHTML = q.options.map((option, optIndex) => {
                    let classes = 'quiz-option p-4 my-2 border-2 border-gray-100 rounded-xl block text-left';
                    if (isSubmitted) {
                        if (option === q.answer) classes += ' correct';
                        else if (selected === option) classes += ' incorrect';
                    } else if (selected === option) classes += ' selected';
                    return `<div class="${classes} ${isSubmitted ? 'pointer-events-none' : ''}" onclick="selectOption('${topicId}', ${index}, '${option.replace(/'/g, "\\'")}')"><span class="font-bold mr-3 text-slate-400">${String.fromCharCode(65 + optIndex)}.</span> ${option}${isSubmitted && option === q.answer ? '<span class="ml-2 text-green-600 font-bold">✓</span>' : ''}</div>`;
                }).join('');
                return `<div class="mb-10 p-8 bg-white rounded-2xl border border-gray-100 shadow-sm"><p class="text-xl font-bold text-slate-900 mb-6">Q${index + 1}: ${q.q}</p>${optionsHTML}</div>`;
            }).join('');
            const resultHTML = result ? `<div class="text-center p-10 bg-blue-600 text-white rounded-3xl mb-10 shadow-2xl"><h3 class="text-3xl font-black mb-2">測驗得分</h3><p class="text-6xl font-black">${result.score} / ${result.total}</p><button class="mt-6 px-6 py-2 bg-white text-blue-600 font-bold rounded-full" onclick="initQuiz(true)">🔄 重新測驗</button></div>` : '';
            return `<h2 class="text-3xl font-extrabold text-slate-900 mb-8">內容測驗</h2>${resultHTML}<div id="quiz-questions">${questionsHTML}</div><div class="mt-12 text-center">${result === undefined ? `<button id="submit-quiz-button" class="w-full sm:w-auto px-12 py-4 bg-red-600 text-white text-xl font-black rounded-2xl shadow-xl hover:bg-red-700 transition disabled:opacity-30" onclick="submitQuizAnswer('${topicId}')" disabled>送出答案並查看結果</button>` : ''}<p id="quiz-message" class="mt-4 text-slate-400"></p></div>`;
        }

        function initQuiz(forceReset = false) {
            const topicId = currentTopicId;
            if (forceReset || currentSubTab !== 'quiz') {
                quizState[topicId] = {};
                quizResult[topicId] = undefined;
                currentSubTab = 'quiz';
            }
            renderContent();
        }

        function selectOption(topicId, questionIndex, selectedOption) {
            if (quizResult[topicId] !== undefined) return;
            quizState[topicId] = quizState[topicId] || {};
            quizState[topicId][questionIndex] = selectedOption;
            updateQuizDisplay(topicId, NEWS_DATA[topicId].quiz);
        }

        function submitQuizAnswer(topicId) {
            const questions = NEWS_DATA[topicId].quiz;
            const answers = quizState[topicId] || {};
            let score = 0;
            questions.forEach((q, index) => { if (answers[index] === q.answer) score++; });
            quizResult[topicId] = { score, total: questions.length };
            renderContent();
        }

        function updateQuizDisplay(topicId, quizQuestions) {
            const currentQuizState = quizState[topicId] || {};
            const answeredCount = Object.keys(currentQuizState).length;
            const submitButton = document.getElementById('submit-quiz-button');
            const quizMessage = document.getElementById('quiz-message');
            if (submitButton) {
                submitButton.disabled = answeredCount !== quizQuestions.length;
                quizMessage.textContent = answeredCount === quizQuestions.length ? '所有題目已作答完畢' : `已作答：${answeredCount} / ${quizQuestions.length}`;
            }
            document.querySelectorAll('.quiz-option').forEach(el => {
                const qIdxText = el.closest('.mb-10').querySelector('p').innerText;
                const qIdx = parseInt(qIdxText.match(/Q(\d+):/)[1]) - 1;
                const optValue = el.innerText.substring(3).replace('✓', '').trim();
                el.classList.remove('selected');
                if (currentQuizState[qIdx] === optValue) el.classList.add('selected');
            });
        }

        function changeTopic(id) { currentTopicId = id; currentSubTab = 'article'; renderTabs(); renderContent(); }
        function changeSubTab(tab) { currentSubTab = tab; renderContent(); }

        window.onload = () => {
            renderTabs();
            renderContent();
        };
    </script>
</body>
</html>
